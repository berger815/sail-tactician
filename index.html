<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TACTICIAN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap');
:root{
  --ink:#050d18;--deep:#080f1e;--hull:#0b1a2e;--plate:#0e2038;
  --glass:rgba(8,15,30,0.94);--teal:#00d4aa;--teal2:#00a888;
  --tealfade:rgba(0,212,170,0.1);--tealring:rgba(0,212,170,0.25);
  --amber:#f5a623;--red:#e84040;--green:#3ddc84;--blue:#4a9eff;
  --white:#d8eaf8;--muted:#3d5a72;--dim:#1a2e42;
  --mono:'Space Mono',monospace;--cond:'Barlow Condensed',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--ink);color:var(--white);font-family:var(--cond)}
.app{display:flex;flex-direction:column;height:100dvh;overflow:hidden;position:relative}

/* ── HEADER ── */
.hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:5px 12px;background:var(--ink);border-bottom:1px solid var(--tealring);gap:8px;z-index:20}
.logo{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.28em;color:var(--teal)}
.hdr-pills{display:flex;gap:4px}
.pill{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:20px;
  border:1px solid var(--muted);color:var(--muted);display:flex;align-items:center;gap:3px}
.pill.ok{border-color:var(--green);color:var(--green)}
.pill.warn{border-color:var(--amber);color:var(--amber)}
.pill.err{border-color:var(--red);color:var(--red)}
.pdot{width:4px;height:4px;border-radius:50%;background:currentColor}
.pill.ok .pdot{animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* ── GUN TIMER ── */
.gun-bar{flex-shrink:0;display:none;align-items:center;justify-content:space-between;
  padding:0 12px;height:42px;background:var(--hull);border-bottom:1px solid var(--tealring);
  transition:background 0.4s}
.gun-bar.vis{display:flex}
.gun-bar.prep{background:rgba(245,166,35,0.12)}
.gun-bar.final{background:rgba(232,64,64,0.12)}
.gun-bar.go{background:rgba(61,220,132,0.15)}
.gun-phase{font-family:var(--cond);font-size:12px;font-weight:700;letter-spacing:0.1em;color:var(--muted);min-width:55px}
.gun-time{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--teal);
  font-variant-numeric:tabular-nums;letter-spacing:0.04em;transition:color 0.3s}
.gun-bar.prep .gun-time{color:var(--amber)}
.gun-bar.final .gun-time{color:var(--red)}
.gun-bar.go .gun-time{color:var(--green);font-size:20px}
.gun-btns{display:flex;gap:6px}
.gun-btn{font-family:var(--mono);font-size:8px;padding:4px 8px;border-radius:3px;
  border:1px solid var(--tealring);color:var(--teal);background:transparent;
  cursor:pointer;letter-spacing:0.08em;touch-action:manipulation}

/* ── CHART ── */
.chart-wrap{flex:1;position:relative;overflow:hidden;background:var(--deep);min-height:0}
#cvTiles,#cvMain{position:absolute;inset:0;touch-action:none}
#cvTiles{z-index:1}#cvMain{z-index:2;background:transparent}

/* ── CHART OVERLAYS ── */
.chart-overlay{position:absolute;z-index:10;pointer-events:none}
.wind-badge{top:10px;right:10px;background:var(--glass);border:1px solid var(--tealring);
  border-radius:8px;padding:6px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none}
.wb-vals{display:flex;gap:8px;font-family:var(--mono);font-size:10px;color:var(--amber);font-weight:700}
.wb-trend{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.04em}
.wb-trend.lift{color:var(--green)}.wb-trend.hdr{color:var(--red)}
.map-btn{position:absolute;top:10px;left:10px;z-index:10;background:var(--glass);
  border:1px solid var(--tealring);border-radius:4px;padding:4px 8px;font-family:var(--mono);
  font-size:8px;color:var(--muted);cursor:pointer;touch-action:manipulation;pointer-events:all}
.map-btn.on{color:var(--teal);border-color:var(--teal)}
.leg-badge{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:10;
  background:var(--glass);border:1px solid var(--tealring);border-radius:20px;
  padding:4px 14px;font-family:var(--mono);font-size:9px;color:var(--teal);
  letter-spacing:0.1em;pointer-events:none;white-space:nowrap}
.xte-badge{position:absolute;bottom:10px;right:10px;z-index:10;background:var(--glass);
  border:1px solid var(--tealring);border-radius:6px;padding:4px 8px;
  font-family:var(--mono);font-size:9px;color:var(--muted);pointer-events:none;text-align:right}
.xte-badge .xte-val{font-size:14px;font-weight:700;color:var(--white)}
.xte-badge .xte-val.warn{color:var(--amber)}.xte-badge .xte-val.crit{color:var(--red)}

/* ── START SCHEMATIC ── */
.start-bar{flex-shrink:0;display:none;background:var(--hull);
  border-top:1px solid var(--tealring);padding:5px 12px;gap:10px;align-items:center}
.start-bar.vis{display:flex}
.sl-canvas-wrap{flex:1;height:30px;position:relative}
.sl-canvas-wrap canvas{display:block;width:100%;height:100%}
.sl-data{flex-shrink:0;display:flex;flex-direction:column;gap:2px;min-width:108px}
.sld{font-family:var(--mono);font-size:8px;color:var(--muted);display:flex;justify-content:space-between;gap:6px}
.sld span{color:var(--white)}.sld.hi span{color:var(--teal)}.sld.ok span{color:var(--green)}
.sld.warn span{color:var(--amber)}.sld.crit span{color:var(--red)}

/* ── COMMIT BANNER ── */
.commit-bar{flex-shrink:0;display:none;align-items:center;justify-content:space-between;
  padding:4px 12px;background:rgba(0,212,170,0.07);border-top:1px solid var(--tealring)}
.commit-bar.vis{display:flex}
.commit-bar.go{background:rgba(61,220,132,0.12);border-top-color:var(--green)}
.commit-bar.late{background:rgba(232,64,64,0.12);border-top-color:var(--red)}
.commit-lbl{font-family:var(--mono);font-size:8px;letter-spacing:0.1em;color:var(--muted)}
.commit-val{font-family:var(--mono);font-size:19px;font-weight:700;color:var(--teal);font-variant-numeric:tabular-nums}
.commit-bar.go .commit-val{color:var(--green)}.commit-bar.late .commit-val{color:var(--red)}
.commit-desc{font-family:var(--cond);font-size:11px;color:var(--muted);text-align:right;max-width:170px;line-height:1.3}

/* ── INSTRUMENTS ── */
.inst-strip{flex-shrink:0;display:grid;grid-template-columns:repeat(5,1fr);
  border-top:1px solid var(--tealring);background:var(--ink)}
.inst{padding:7px 4px 5px;border-right:1px solid rgba(0,212,170,0.08);
  display:flex;flex-direction:column;align-items:center;gap:1px}
.inst:last-child{border-right:none}
.iv{font-family:var(--mono);font-size:19px;font-weight:700;line-height:1;
  color:var(--white);font-variant-numeric:tabular-nums}
.iv.hi{color:var(--teal)}.iv.warn{color:var(--amber)}.iv.crit{color:var(--red)}.iv.ok{color:var(--green)}
.il{font-family:var(--cond);font-size:9px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase}

/* ── TACK STRIP ── */
.tack-strip{flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:5px 12px;background:var(--hull);border-top:1px solid rgba(0,212,170,0.08)}
.tack-rec{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.06em;
  padding:6px 10px;border-radius:3px;border:1px solid;flex:1;text-align:center;line-height:1.3}
.tack-rec.stbd{background:rgba(61,220,132,0.08);border-color:rgba(61,220,132,0.4);color:var(--green)}
.tack-rec.port{background:rgba(232,64,64,0.08);border-color:rgba(232,64,64,0.4);color:var(--red)}
.tack-rec.reach{background:rgba(74,158,255,0.08);border-color:rgba(74,158,255,0.4);color:var(--blue)}
.tack-rec.none{background:var(--tealfade);border-color:var(--tealring);color:var(--muted)}
.eff-ring{flex-shrink:0}

/* ── MARK ADVANCE ── */
.mark-advance{flex-shrink:0;display:none;align-items:center;justify-content:space-between;
  padding:5px 12px;background:rgba(61,220,132,0.08);border-top:1px solid rgba(61,220,132,0.25)}
.mark-advance.vis{display:flex}
.ma-label{font-family:var(--mono);font-size:9px;color:var(--green);letter-spacing:0.1em}
.ma-btn{font-family:var(--mono);font-size:9px;padding:5px 14px;border-radius:3px;
  border:1px solid var(--green);color:var(--green);background:transparent;
  cursor:pointer;touch-action:manipulation;letter-spacing:0.08em;font-weight:700}

/* ── TOOLBAR ── */
.toolbar{flex-shrink:0;display:flex;background:var(--ink);
  border-top:1px solid var(--tealring);padding-bottom:var(--safe-bottom)}
.tbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:7px 4px;gap:3px;border-right:1px solid rgba(0,212,170,0.08);
  cursor:pointer;touch-action:manipulation;background:transparent;
  border-top:none;border-bottom:none;border-left:none;color:var(--muted);transition:all 0.15s}
.tbtn:last-child{border-right:none}
.tbtn.on,.tbtn:active{background:var(--tealfade);color:var(--teal)}
.tbtn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tbtn-lbl{font-family:var(--cond);font-size:9px;letter-spacing:0.08em;text-transform:uppercase}

/* ── MODALS ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;
  align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--hull);border:1px solid var(--tealring);border-radius:14px 14px 0 0;
  padding:18px 16px 28px;width:100%;max-width:500px;max-height:90dvh;
  overflow-y:auto;-webkit-overflow-scrolling:touch}
.mhandle{width:32px;height:3px;border-radius:2px;background:var(--muted);margin:0 auto 14px}
.modal h3{font-family:var(--mono);font-size:10px;letter-spacing:0.2em;color:var(--teal);
  text-transform:uppercase;margin-bottom:14px}
.mtabs{display:flex;margin-bottom:14px;border-bottom:1px solid var(--tealring)}
.mtab{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;padding:6px 12px;
  border:none;background:transparent;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;text-transform:uppercase}
.mtab.on{color:var(--teal);border-bottom-color:var(--teal)}
.tp{display:none}.tp.on{display:block}
.frow{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.frow label{font-family:var(--mono);font-size:8px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase}
.frow input,.frow select,.frow textarea{background:var(--deep);border:1px solid var(--tealring);
  border-radius:4px;color:var(--white);padding:9px 10px;font-family:var(--mono);
  font-size:12px;width:100%;-webkit-appearance:none}
.frow input:focus,.frow select:focus{outline:none;border-color:var(--teal)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.mbtns{display:flex;gap:8px;margin-top:14px}
.mbtn{flex:1;font-family:var(--mono);font-size:9px;letter-spacing:0.08em;padding:11px 6px;
  border-radius:4px;border:1px solid;cursor:pointer;text-transform:uppercase;
  touch-action:manipulation;text-align:center}
.mbtn.pri{background:var(--teal);color:var(--ink);border-color:var(--teal);font-weight:700}
.mbtn.sec{background:transparent;color:var(--teal);border-color:var(--tealring)}
.mbtn.warn{background:transparent;color:var(--amber);border-color:rgba(245,166,35,0.35)}
.mbtn.can{background:transparent;color:var(--muted);border-color:rgba(61,90,114,0.4)}
.mbtn.red{background:transparent;color:var(--red);border-color:rgba(232,64,64,0.35)}

/* ── WAYPOINT LIST ── */
.wpt-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.wpt-item{background:var(--deep);border:1px solid var(--tealring);border-radius:6px;
  padding:8px 10px;display:flex;align-items:center;gap:8px}
.wpt-item.active-mark{border-color:var(--teal);background:var(--tealfade)}
.wpt-seq{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:18px}
.wpt-label{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--teal);min-width:28px}
.wpt-coords{font-family:var(--mono);font-size:9px;color:var(--muted);flex:1}
.wpt-rnd{font-family:var(--cond);font-size:10px;padding:2px 7px;border-radius:10px;
  border:1px solid var(--tealring);color:var(--muted);cursor:pointer;touch-action:manipulation;
  background:transparent;white-space:nowrap}
.wpt-rnd.port{border-color:rgba(232,64,64,0.4);color:var(--red)}
.wpt-rnd.stbd{border-color:rgba(61,220,132,0.4);color:var(--green)}
.wpt-del{font-family:var(--mono);font-size:11px;color:var(--muted);padding:2px 6px;
  cursor:pointer;touch-action:manipulation;background:transparent;border:none}

/* ── POLAR TABLE ── */
.polar-tbl{width:100%;border-collapse:collapse}
.polar-tbl th{font-family:var(--mono);font-size:8px;color:var(--muted);padding:3px 4px;
  text-align:center;border-bottom:1px solid var(--tealring)}
.polar-tbl td{padding:3px 3px;text-align:center}
.polar-tbl input{width:100%;background:var(--deep);border:1px solid rgba(0,212,170,0.1);
  border-radius:3px;color:var(--white);padding:5px 3px;font-family:var(--mono);
  font-size:11px;text-align:center;-webkit-appearance:none}
.polar-tbl input:focus{outline:none;border-color:var(--teal)}

/* ── TIMER GRID ── */
.seq-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.seq-btn{padding:12px 8px;border-radius:6px;border:1px solid var(--tealring);
  background:var(--deep);color:var(--teal);font-family:var(--mono);font-size:11px;
  font-weight:700;cursor:pointer;text-align:center;touch-action:manipulation;line-height:1.4}
.seq-btn.on{background:var(--tealfade);border-color:var(--teal)}
.seq-sub{font-size:8px;font-weight:400;color:var(--muted);display:block;margin-top:2px}

/* ── TOAST ── */
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--hull);border:1px solid var(--tealring);border-radius:6px;
  padding:7px 16px;font-family:var(--mono);font-size:10px;color:var(--teal);
  opacity:0;pointer-events:none;transition:all 0.2s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── WIND HISTORY GRAPH ── */
.wind-graph{width:100%;height:60px;display:block;margin-bottom:10px}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="logo">TACTICIAN</div>
    <div class="hdr-pills">
      <div class="pill" id="pGPS"><div class="pdot"></div>GPS</div>
      <div class="pill" id="pHDG"><div class="pdot"></div>HDG</div>
      <div class="pill" id="pWND"><div class="pdot"></div>WND</div>
    </div>
  </div>

  <!-- GUN TIMER -->
  <div class="gun-bar" id="gunBar">
    <div class="gun-phase" id="gunPhase">PREP</div>
    <div class="gun-time" id="gunTime">5:00</div>
    <div class="gun-btns">
      <button class="gun-btn" id="btnSync">SYNC</button>
      <button class="gun-btn" id="btnGunStop">&#x2715;</button>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-wrap" id="chartWrap">
    <canvas id="cvTiles"></canvas>
    <canvas id="cvMain"></canvas>
    <button class="map-btn" id="mapBtn" onclick="toggleMap()">CHART</button>
    <div class="chart-overlay wind-badge">
      <canvas id="cvWind" width="56" height="56"></canvas>
      <div class="wb-vals"><span id="wbSpd">--</span><span id="wbDir">---&deg;</span></div>
      <div class="wb-trend" id="wbTrend">NO DATA</div>
    </div>
    <div class="leg-badge" id="legBadge" style="display:none"></div>
    <div class="xte-badge" id="xteBadge" style="display:none">
      <div>XTE</div><div class="xte-val" id="xteVal">--</div>
    </div>
  </div>

  <!-- START LINE SCHEMATIC -->
  <div class="start-bar" id="startBar">
    <div class="sl-canvas-wrap"><canvas id="cvLine"></canvas></div>
    <div class="sl-data">
      <div class="sld hi"><span>DIST</span><span id="slDist">--m</span></div>
      <div class="sld" id="slBurnRow"><span>BURN</span><span id="slBurn">--:--</span></div>
      <div class="sld"><span>FAV</span><span id="slFav">--</span></div>
    </div>
  </div>

  <!-- COMMIT BANNER -->
  <div class="commit-bar" id="commitBar">
    <div>
      <div class="commit-lbl">COMMIT IN</div>
      <div class="commit-val" id="commitVal">--:--</div>
    </div>
    <div class="commit-desc" id="commitDesc">START TIMER</div>
  </div>

  <!-- INSTRUMENTS: HDG / SOG / TWA / TWS / VMG -->
  <div class="inst-strip">
    <div class="inst"><div class="iv hi" id="iHDG">---</div><div class="il">HDG</div></div>
    <div class="inst"><div class="iv" id="iSOG">0.0</div><div class="il">SOG kt</div></div>
    <div class="inst"><div class="iv" id="iTWA">---</div><div class="il">TWA &deg;</div></div>
    <div class="inst"><div class="iv warn" id="iTWS">--</div><div class="il">TWS kt</div></div>
    <div class="inst"><div class="iv" id="iVMG">--</div><div class="il" id="iVMGlbl">VMG kt</div></div>
  </div>

  <!-- TACK / GYBE RECOMMENDATION -->
  <div class="tack-strip">
    <div class="tack-rec none" id="tackRec">SET COURSE &amp; WIND</div>
    <div class="eff-ring"><canvas id="cvEff" width="40" height="40"></canvas></div>
  </div>

  <!-- MARK ADVANCE PROMPT -->
  <div class="mark-advance" id="markAdvance">
    <div class="ma-label" id="maLabel">APPROACHING MARK</div>
    <button class="ma-btn" onclick="advanceMark()">MARK ROUNDED &#10140;</button>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="tbtn" id="btnSensors" onclick="toggleSensors()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M6.3 6.3a8 8 0 0 0 0 11.4"/><path d="M17.7 6.3a8 8 0 0 1 0 11.4"/><path d="M3.5 3.5a14 14 0 0 0 0 17"/><path d="M20.5 3.5a14 14 0 0 1 0 17"/></svg>
      <span class="tbtn-lbl">Sensors</span>
    </button>
    <button class="tbtn" id="btnWind" onclick="fetchWind()">
      <svg viewBox="0 0 24 24"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>
      <span class="tbtn-lbl">Wind</span>
    </button>
    <button class="tbtn" id="btnCourse" onclick="openModal('mCourse')">
      <svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
      <span class="tbtn-lbl">Course</span>
    </button>
    <button class="tbtn" id="btnPolar" onclick="openModal('mPolar')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
      <span class="tbtn-lbl">Polar</span>
    </button>
    <button class="tbtn" id="btnTimer" onclick="openModal('mTimer')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3 2 6"/><path d="M22 6l-3-3"/><line x1="12" y1="5" x2="12" y2="2"/></svg>
      <span class="tbtn-lbl">Start</span>
    </button>
  </div>
</div>

<!-- ═══ COURSE MODAL ═══ -->
<div class="modal-bg" id="mCourse">
 <div class="modal">
  <div class="mhandle"></div>
  <h3>Course Setup</h3>
  <div class="mtabs">
   <button class="mtab on" onclick="mTab('course','line')">Start Line</button>

<script>
'use strict';
// ╔══════════════════════════════════════════════════════════╗
// ║  TACTICIAN  v2.0  —  ground-up rebuild                  ║
// ║  Single-file PWA · NOAA chart · Polar tactics engine    ║
// ╚══════════════════════════════════════════════════════════╝

// ── KALMAN FILTERS ──────────────────────────────────────────
class K1D {
  constructor(Q=0.5,R=3){this.Q=Q;this.R=R;this.P=10;this.x=null}
  update(z){
    if(this.x===null){this.x=z;return z}
    this.P+=this.Q;
    const K=this.P/(this.P+this.R);
    let d=z-this.x;
    if(d>180)d-=360;if(d<-180)d+=360;
    this.x=((this.x+K*d)%360+360)%360;
    this.P*=(1-K);return this.x;
  }
  reset(){this.x=null;this.P=10}
}
class KLin {
  constructor(Q=0.1,R=0.4){this.Q=Q;this.R=R;this.P=5;this.x=null}
  update(z){
    if(this.x===null){this.x=z;return z}
    this.P+=this.Q;const K=this.P/(this.P+this.R);
    this.x+=K*(z-this.x);this.P*=(1-K);return this.x;
  }
  reset(){this.x=null;this.P=5}
}
const kfHdg=new K1D(0.5,3),kfSog=new KLin(0.1,0.4),kfTwd=new K1D(0.3,5);

// ── STATE ───────────────────────────────────────────────────
const NAV={lat:null,lon:null,hdg:null,sog:0,cog:null,
           prevLat:null,prevLon:null,prevT:null,
           track:[],  // [{lat,lon,t}]
           desiredTrack:[] // [{lat,lon}] computed optimal path
          };
const WIND={twd:null,tws:null,
            hist:[],   // [{t,twd,tws}] last 20 readings
            autoTimer:null};
const COURSE={
  pinA:null,pinB:null,          // start line
  finA:null,finB:null,          // finish line (null = reuse start)
  waypoints:[],                 // [{label,lat,lon,rounding:'port'|'stbd'|'none'}]
  activeMark:-1,                // index into waypoints, -1 = pre-start
  tackDur:20
};
const RACE={active:false,epoch:null,seq:5};
const VIEW={scale:1,offX:0,offY:0,map:true,
            dragging:false,lx:0,ly:0,
            pinchDist:null,baseScale:1,baseOX:0,baseOY:0};
const POLAR_TWS=[6,10,14,18,22];
const DEF_TWA=[42,52,70,90,110,135,150];
let polarTable={},polarAngles=[];
let dirty=true,tileCache={};
let demoInt=null,demoT=0;
let sensorsOn=false,gpsWatch=null,absActive=false;
let selSeqVal=5,gunInt=null;

// ── POLARS ──────────────────────────────────────────────────
// Com-Pac 35: LWL 29ft · hull spd 7.22kt · SA/D 16.99 · PHRF 147-167
// Anchors: 5-5.5kt BSP in 6-8kt TWS; 35-36deg AWA @ 16kt TWS
const PRESETS={
  compac35:{rows:[
    [42, 3.8,5.2,5.8,6.0,5.8],
    [52, 4.2,5.7,6.3,6.6,6.4],
    [70, 4.5,5.9,6.6,7.0,7.0],
    [90, 4.3,5.7,6.5,7.1,7.2],
    [110,4.1,5.8,6.8,7.2,7.2],
    [135,3.8,5.4,6.6,7.1,7.1],
    [150,3.4,4.9,6.2,6.8,7.0]]},
  j24:{rows:[
    [40,3.8,5.4,6.1,6.3,6.2],[52,4.1,5.8,6.5,6.7,6.6],[70,4.4,5.6,6.3,6.5,6.4],
    [90,4.2,5.4,6.1,6.3,6.2],[110,4.0,5.6,6.8,7.0,6.9],[135,3.6,5.2,6.5,6.7,6.6],[150,3.2,4.8,6.0,6.2,6.1]]},
  laser:{rows:[
    [40,3.0,4.2,4.8,4.6,4.4],[52,3.3,4.6,5.1,4.9,4.7],[70,3.5,4.4,4.9,4.7,4.5],
    [90,3.3,4.2,4.7,4.5,4.3],[110,3.1,4.4,5.2,5.0,4.8],[135,2.8,4.0,4.9,4.7,4.5],[150,2.5,3.7,4.5,4.3,4.1]]},
  c40:{rows:[
    [42,4.5,6.2,7.0,7.3,7.2],[52,4.9,6.6,7.4,7.7,7.6],[70,5.1,6.5,7.3,7.8,7.8],
    [90,4.9,6.4,7.2,7.8,7.9],[110,4.6,6.5,7.7,8.1,8.1],[135,4.2,6.0,7.5,8.0,8.0],[150,3.8,5.5,7.0,7.6,7.7]]}
};

function buildPolarDOM(rows){
  const tb=document.getElementById('polarBody');tb.innerHTML='';
  rows.forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td style="font-family:var(--mono);font-size:10px;color:var(--muted);padding:3px 2px">${r[0]}&deg;</td>`;
    for(let i=1;i<=5;i++)tr.innerHTML+=`<td><input type="number" step="0.1" min="0" max="20" data-twa="${r[0]}" data-ti="${i-1}" value="${r[i]||''}"></td>`;
    tb.appendChild(tr);
  });
}
function loadPolarPreset(){
  const k=document.getElementById('polarPreset').value;
  if(!k||!PRESETS[k])buildPolarDOM(DEF_TWA.map(a=>[a,'','','','','']));
  else buildPolarDOM(PRESETS[k].rows);
}
function commitPolar(){
  const tbl={};
  document.querySelectorAll('#polarBody input').forEach(i=>{
    const twa=parseInt(i.dataset.twa),ti=parseInt(i.dataset.ti);
    if(!tbl[twa])tbl[twa]=[0,0,0,0,0];
    tbl[twa][ti]=parseFloat(i.value)||0;
  });
  polarTable=tbl;
  // Compute best VMG angle per TWS column
  polarAngles=POLAR_TWS.map((_,ti)=>{
    let best=-Infinity,ang=42;
    Object.entries(tbl).forEach(([twa,s])=>{
      const a=parseInt(twa);if(a>90)return;
      const v=s[ti]*Math.cos(a*Math.PI/180);
      if(v>best){best=v;ang=a;}
    });
    return ang;
  });
  saveState();
}
function savePolar(){commitPolar();closeModal('mPolar');toast('Polar saved');}

function polarBSP(twa,tws){
  if(!Object.keys(polarTable).length)return NAV.sog||4;
  const angs=Object.keys(polarTable).map(Number).sort((a,b)=>a-b);
  const at=Math.abs(twa);
  // TWS bracket
  let ti0,ti1,tf;
  if(tws<=POLAR_TWS[0]){ti0=0;ti1=0;tf=0;}
  else if(tws>=POLAR_TWS[4]){ti0=4;ti1=4;tf=0;}
  else{
    ti0=0;
    for(let i=0;i<4;i++){if(tws>=POLAR_TWS[i]&&tws<POLAR_TWS[i+1]){ti0=i;break;}}
    ti1=ti0+1;tf=(tws-POLAR_TWS[ti0])/(POLAR_TWS[ti1]-POLAR_TWS[ti0]);
  }
  // TWA bracket
  let lo=angs[0],hi=angs[angs.length-1];
  for(let i=0;i<angs.length-1;i++){if(at>=angs[i]&&at<=angs[i+1]){lo=angs[i];hi=angs[i+1];break;}}
  const af=lo===hi?0:(at-lo)/(hi-lo);
  const s=(a,ti)=>(polarTable[a]&&polarTable[a][ti]!=null)?polarTable[a][ti]:0;
  const lo0=s(lo,ti0),lo1=s(lo,ti1),hi0=s(hi,ti0),hi1=s(hi,ti1);
  return (lo0*(1-tf)+lo1*tf)*(1-af)+(hi0*(1-tf)+hi1*tf)*af;
}
function optAngle(tws){
  if(!polarAngles.length||!tws)return 42;
  if(tws<=POLAR_TWS[0])return polarAngles[0];
  if(tws>=POLAR_TWS[4])return polarAngles[4];
  for(let i=0;i<4;i++){
    if(tws>=POLAR_TWS[i]&&tws<POLAR_TWS[i+1]){
      const t=(tws-POLAR_TWS[i])/(POLAR_TWS[i+1]-POLAR_TWS[i]);
      return polarAngles[i]*(1-t)+polarAngles[i+1]*t;
    }
  }
  return 42;
}

// ── LEG CLASSIFIER ──────────────────────────────────────────
// Returns 'upwind' | 'reach' | 'downwind'
function classifyLeg(markBrng){
  if(WIND.twd===null)return'upwind';
  const abs=Math.abs(angDiff(WIND.twd,markBrng));
  if(abs<70)return'upwind';
  if(abs>110)return'downwind';
  return'reach';
}

// ── TACTICS ENGINE ──────────────────────────────────────────
function computeTactics(){
  const tgt=activeMark();
  if(!tgt||WIND.twd===null||NAV.lat===null)return null;
  const mb=bearing(NAV.lat,NAV.lon,tgt.lat,tgt.lon);
  const leg=classifyLeg(mb);
  const tws=WIND.tws||10;
  const opt=optAngle(tws);

  if(leg==='upwind'){
    const sHdg=normA(WIND.twd-opt), pHdg=normA(WIND.twd+opt);
    const twa_s=angDiff(WIND.twd,sHdg), twa_p=angDiff(WIND.twd,pHdg);
    const bsp_s=polarBSP(twa_s,tws), bsp_p=polarBSP(twa_p,tws);
    const ang_s=Math.abs(angDiff(sHdg,mb))*Math.PI/180;
    const ang_p=Math.abs(angDiff(pHdg,mb))*Math.PI/180;
    const vmg_s=bsp_s*Math.cos(ang_s), vmg_p=bsp_p*Math.cos(ang_p);
    const best=vmg_s>=vmg_p?'stbd':'port';
    const bestHdg=best==='stbd'?sHdg:pHdg;
    const bestVMG=best==='stbd'?vmg_s:vmg_p;
    const maxVMG=Math.max(vmg_s,vmg_p);
    const eff=maxVMG>0?Math.min(100,bestVMG/maxVMG*100):0;
    // Lift/header detection
    const shift=windShiftDeg();
    const onPort=(NAV.hdg!==null)&&angDiff(WIND.twd,NAV.hdg)>0;
    const shiftNote=shift===0?'':(onPort?(shift<0?'LIFTED-HOLD':'HEADED-TACK'):(shift>0?'LIFTED-HOLD':'HEADED-TACK'));
    // Laylines from mark
    const layS=normA(WIND.twd-opt+180), layP=normA(WIND.twd+opt+180);
    return{leg,best,bestHdg,bestVMG,vmg_s,vmg_p,eff,sHdg,pHdg,
           layS,layP,mb,shiftNote,shift};
  }

  if(leg==='downwind'){
    const ga=180-opt;
    const sGybe=normA(WIND.twd+ga), pGybe=normA(WIND.twd-ga);
    const twa_s=angDiff(WIND.twd,sGybe), twa_p=angDiff(WIND.twd,pGybe);
    const bsp_s=polarBSP(twa_s,tws), bsp_p=polarBSP(twa_p,tws);
    const ang_s=Math.abs(angDiff(sGybe,mb))*Math.PI/180;
    const ang_p=Math.abs(angDiff(pGybe,mb))*Math.PI/180;
    const vmg_s=bsp_s*Math.cos(ang_s), vmg_p=bsp_p*Math.cos(ang_p);
    const best=vmg_s>=vmg_p?'stbd':'port';
    const bestHdg=best==='stbd'?sGybe:pGybe;
    const bestVMG=best==='stbd'?vmg_s:vmg_p;
    const eff=Math.max(vmg_s,vmg_p)>0?Math.min(100,Math.max(vmg_s,vmg_p)/Math.max(vmg_s,vmg_p)*100):0;
    return{leg,best,bestHdg,bestVMG,vmg_s,vmg_p,eff:70,sGybe,pGybe,mb};
  }

  // Reach
  const twa=angDiff(WIND.twd,mb);
  const bsp=polarBSP(twa,tws);
  // High or low call — lift vs header
  const shift=windShiftDeg();
  const high=shift<-2, low=shift>2;
  const note=high?'SAIL HIGH — LIFTED':low?'SAIL LOW — HEADED':'ON TRACK';
  return{leg,best:'reach',bestHdg:mb,bestVMG:bsp,eff:80,mb,note,twa};
}

// ── START LINE ANALYSIS ──────────────────────────────────────
function computeStartMetrics(){
  if(!COURSE.pinA||!COURSE.pinB||NAV.lat===null)return null;
  const A={x:0,y:0},B=ll2xy(COURSE.pinA,COURSE.pinB),P=ll2xy(COURSE.pinA,{lat:NAV.lat,lon:NAV.lon});
  const AB={x:B.x,y:B.y},len=Math.hypot(AB.x,AB.y);
  if(len<3)return null;
  const tRaw=(P.x*AB.x+P.y*AB.y)/(len*len);
  const t=Math.max(0,Math.min(1,tRaw));
  const C={x:AB.x*t,y:AB.y*t};
  const toLine={x:C.x-P.x,y:C.y-P.y},distM=Math.hypot(toLine.x,toLine.y);
  const side=Math.sign(AB.x*P.y-AB.y*P.x)||1;
  let favored=null,biasM=0,favEnd=null;
  if(WIND.twd!==null){
    const up={x:Math.sin(WIND.twd*Math.PI/180),y:Math.cos(WIND.twd*Math.PI/180)};
    const mid={x:B.x/2,y:B.y/2};
    const aP=(A.x-mid.x)*up.x+(A.y-mid.y)*up.y;
    const bP=(B.x-mid.x)*up.x+(B.y-mid.y)*up.y;
    favored=aP>=bP?'A':'B';
    favEnd=favored==='A'?COURSE.pinA:COURSE.pinB;
    biasM=Math.abs(aP-bP);
  }
  const crs=NAV.cog??NAV.hdg,sogMS=(NAV.sog||0)*0.514444;
  let closingMS=0;
  if(distM>0.5&&crs!==null){
    const v={x:Math.sin(crs*Math.PI/180)*sogMS,y:Math.cos(crs*Math.PI/180)*sogMS};
    const u=distM>0?{x:toLine.x/distM,y:toLine.y/distM}:{x:0,y:0};
    closingMS=v.x*u.x+v.y*u.y;
  }
  const ttl=closingMS>0.1?distM/closingMS:Infinity;
  const gunRem=RACE.active&&RACE.epoch?Math.max(0,(RACE.epoch-Date.now())/1000):Infinity;
  const burn=isFinite(gunRem)&&isFinite(ttl)?gunRem-ttl:Infinity;
  let approachSpd=NAV.sog||4;
  let distToFav=distM;
  if(favEnd){
    const FP=ll2xy(COURSE.pinA,favEnd);distToFav=Math.hypot(FP.x-P.x,FP.y-P.y);
    if(Object.keys(polarTable).length){
      const fb=bearing(NAV.lat,NAV.lon,favEnd.lat,favEnd.lon);
      approachSpd=Math.max(1,polarBSP(angDiff(WIND.twd??0,fb),WIND.tws||10));
    }
  }
  const approachMS=approachSpd*0.514444;
  const commitIn=isFinite(gunRem)?gunRem-(distToFav+approachMS*(COURSE.tackDur+8))/approachMS:Infinity;
  const isOver=side>0&&distM<2;
  return{distM,ttl,burn,gunRem,closingMS,favored,biasM,favEnd,
         pctAlong:tRaw*100,side,approachSpd,commitIn,isOver,lineLenM:len};
}

// ── WIND SHIFT ANALYSIS ──────────────────────────────────────
function windShiftDeg(){
  const h=WIND.hist;if(h.length<4)return 0;
  const n=h.length,recent=h.slice(-4),old=h.slice(0,4);
  const avg=arr=>arr.reduce((s,e)=>s+e.twd,0)/arr.length;
  return avg(recent)-avg(old);
}
function windTrend(){
  const h=WIND.hist;if(h.length<3)return{t:'NO DATA',d:0};
  const n=h.length;let sx=0,sy=0,sxy=0,sx2=0;
  for(let i=0;i<n;i++){sx+=i;sy+=h[i].twd;sxy+=i*h[i].twd;sx2+=i*i;}
  const slope=(n*sxy-sx*sy)/(n*sx2-sx*sx)||0;
  const deg=slope*n;
  if(Math.abs(deg)<1.5)return{t:'STEADY',d:0};
  return{t:deg<0?'LEFT':'RIGHT',d:Math.abs(deg).toFixed(1)};
}

// ── CROSS-TRACK ERROR ────────────────────────────────────────
function computeXTE(){
  const tgt=activeMark();
  if(!tgt||NAV.lat===null)return null;
  // Find the leg start point
  const legStart=COURSE.activeMark>0?COURSE.waypoints[COURSE.activeMark-1]:
                 (COURSE.pinA?{lat:(COURSE.pinA.lat+COURSE.pinB.lat)/2,lon:(COURSE.pinA.lon+COURSE.pinB.lon)/2}:null);
  if(!legStart)return null;
  const A=ll2xy(legStart,tgt);
  const B=ll2xy(legStart,{lat:NAV.lat,lon:NAV.lon});
  const len=Math.hypot(A.x,A.y);
  if(len<10)return 0;
  // Perpendicular distance = cross product / len
  return(A.x*B.y-A.y*B.x)/len; // +ve = right of rhumb, -ve = left
}

// ── DESIRED TRACK COMPUTATION ────────────────────────────────
function computeDesiredTrack(){
  // Returns array of {lat,lon} waypoints for the optimal path to current mark
  const tgt=activeMark();
  if(!tgt||NAV.lat===null||WIND.twd===null)return[];
  const tac=computeTactics();
  if(!tac)return[{lat:NAV.lat,lon:NAV.lon},{lat:tgt.lat,lon:tgt.lon}];
  if(tac.leg==='reach'){
    return[{lat:NAV.lat,lon:NAV.lon},{lat:tgt.lat,lon:tgt.lon}];
  }
  // Upwind/downwind: insert a tack/gybe point
  const dist=haversine(NAV.lat,NAV.lon,tgt.lat,tgt.lon);
  const hdgRad=tac.bestHdg*Math.PI/180;
  // Project forward on best tack/gybe for ~40% of distance
  const R=6371000,lat1=NAV.lat*Math.PI/180;
  const d1=dist*0.45/R;
  const intLat=Math.asin(Math.sin(lat1)*Math.cos(d1)+Math.cos(lat1)*Math.sin(d1)*Math.cos(hdgRad))*180/Math.PI;
  const intLon=NAV.lon+Math.atan2(Math.sin(hdgRad)*Math.sin(d1)*Math.cos(lat1),Math.cos(d1)-Math.sin(lat1)*Math.sin(intLat*Math.PI/180))*180/Math.PI;
  return[{lat:NAV.lat,lon:NAV.lon},{lat:intLat,lon:intLon},{lat:tgt.lat,lon:tgt.lon}];
}

// ── TOUCH ────────────────────────────────────────────────────
function tDist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY)}
cvM.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){VIEW.pinchDist=tDist(e.touches);VIEW.baseScale=VIEW.scale;VIEW.baseOX=VIEW.offX;VIEW.baseOY=VIEW.offY;}
  else{VIEW.dragging=true;VIEW.lx=e.touches[0].clientX;VIEW.ly=e.touches[0].clientY;}
},{passive:false});
cvM.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&VIEW.pinchDist){
    const nd=tDist(e.touches),sf=nd/VIEW.pinchDist,ns=Math.max(0.4,Math.min(24,VIEW.baseScale*sf));
    const r=cvM.getBoundingClientRect();
    const mx=((e.touches[0].clientX+e.touches[1].clientX)/2-r.left)/r.width;
    const my=((e.touches[0].clientY+e.touches[1].clientY)/2-r.top)/r.height;
    VIEW.offX=mx-(mx-VIEW.baseOX)*(ns/VIEW.baseScale);
    VIEW.offY=my-(my-VIEW.baseOY)*(ns/VIEW.baseScale);
    VIEW.scale=ns;setDirty();
  }else if(e.touches.length===1&&VIEW.dragging){
    VIEW.offX+=(e.touches[0].clientX-VIEW.lx)/cvM.clientWidth;
    VIEW.offY+=(e.touches[0].clientY-VIEW.ly)/cvM.clientHeight;
    VIEW.lx=e.touches[0].clientX;VIEW.ly=e.touches[0].clientY;setDirty();
  }
},{passive:false});
cvM.addEventListener('touchend',e=>{
  if(e.touches.length<2)VIEW.pinchDist=null;
  if(e.touches.length===0)VIEW.dragging=false;
},{passive:true});
let lastTap=0;
cvM.addEventListener('touchend',e=>{
  const n=Date.now();if(n-lastTap<280){VIEW.scale=1;VIEW.offX=0;VIEW.offY=0;setDirty();}lastTap=n;
},{passive:true});

// ── NOAA TILES ───────────────────────────────────────────────
const TILE='https://tileservice.charts.noaa.gov/tiles/50000_1/{z}/{x}/{y}.png';
function ll2tile(lat,lon,z){
  const n=2**z,x=Math.floor((lon+180)/360*n);
  const lr=lat*Math.PI/180,y=Math.floor((1-Math.log(Math.tan(lr)+1/Math.cos(lr))/Math.PI)/2*n);
  return{x,y,z};
}
function tile2ll(x,y,z){
  const n=2**z,lon=x/n*360-180,lr=Math.atan(Math.sinh(Math.PI*(1-2*y/n)));
  return{lat:lr*180/Math.PI,lon};
}
function getTile(z,x,y){
  const k=`${z}/${x}/${y}`;if(tileCache[k])return tileCache[k];
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=()=>{tileCache[k].ok=true;setDirty();};
  img.onerror=()=>{tileCache[k].err=true;};
  img.src=TILE.replace('{z}',z).replace('{x}',x).replace('{y}',y);
  return tileCache[k]={img,ok:false,err:false};
}
function renderTiles(b,W,H){
  if(!VIEW.map)return;
  ctxT.save();ctxT.scale(devicePixelRatio,devicePixelRatio);ctxT.clearRect(0,0,W,H);
  const z=Math.min(16,Math.max(7,Math.round(13+Math.log2(VIEW.scale))));
  const cLat=(b.n+b.s)/2,cLon=(b.e+b.w)/2;
  const ref=ll2tile(cLat,cLon,z);
  const dTileX=360/2**z;
  const tLat=tile2ll(ref.x,ref.y,z).lat,bLat=tile2ll(ref.x,ref.y+1,z).lat;
  const dTileY=tLat-bLat;
  const pxDX=W/(b.e-b.w)*VIEW.scale,pxDY=H/(b.n-b.s)*VIEW.scale;
  const twX=dTileX*pxDX,twY=dTileY*pxDY;
  for(let tx=ref.x-3;tx<=ref.x+3;tx++){
    for(let ty=ref.y-3;ty<=ref.y+3;ty++){
      const o=tile2ll(tx,ty,z);
      const sx=(o.lon-b.w)/(b.e-b.w)*W*VIEW.scale+VIEW.offX*W*VIEW.scale;
      const sy=(1-(o.lat-b.s)/(b.n-b.s))*H*VIEW.scale+VIEW.offY*H*VIEW.scale;
      const t=getTile(z,tx,ty);
      if(t.ok){ctxT.globalAlpha=0.48;ctxT.drawImage(t.img,sx,sy,twX+1,twY+1);ctxT.globalAlpha=1;}
    }
  }
  ctxT.restore();
}
function toggleMap(){
  VIEW.map=!VIEW.map;
  const b=document.getElementById('mapBtn');
  b.textContent=VIEW.map?'CHART ON':'CHART';
  b.classList.toggle('on',VIEW.map);
  setDirty();
}

async function toggleSensors(){if(sensorsOn)stopSensors();else await startSensors();}
async function startSensors(){
  document.getElementById('btnSensors').classList.add('on');
  if('geolocation'in navigator)
    gpsWatch=navigator.geolocation.watchPosition(onGPS,()=>pill('pGPS','warn'),{enableHighAccuracy:true,maximumAge:1000,timeout:15000});
  else pill('pGPS','warn');
  if(window.DeviceOrientationEvent){
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      try{const r=await DeviceOrientationEvent.requestPermission();
        if(r==='granted')listenOri();else pill('pHDG','warn');
      }catch{pill('pHDG','warn');}
    }else listenOri();
  }else pill('pHDG','warn');
  sensorsOn=true;toast('Sensors on');
}
function stopSensors(){
  if(gpsWatch!=null)navigator.geolocation.clearWatch(gpsWatch);
  window.removeEventListener('deviceorientationabsolute',onOriAbs,true);
  window.removeEventListener('deviceorientation',onOriRel,true);
  absActive=false;sensorsOn=false;
  document.getElementById('btnSensors').classList.remove('on');
  ['pGPS','pHDG'].forEach(p=>pill(p,''));
  kfHdg.reset();kfSog.reset();toast('Sensors off');
}
function listenOri(){
  window.addEventListener('deviceorientationabsolute',onOriAbs,true);
  window.addEventListener('deviceorientation',onOriRel,true);
}
function onOriAbs(e){if(e.alpha==null)return;absActive=true;NAV.hdg=kfHdg.update((360-e.alpha+360)%360);pill('pHDG','ok');setDirty();}
function onOriRel(e){
  if(absActive)return;let r=null;
  if(e.webkitCompassHeading!=null)r=e.webkitCompassHeading;
  else if(e.alpha!=null)r=(360-e.alpha+360)%360;
  if(r!=null){NAV.hdg=kfHdg.update(r);pill('pHDG','ok');setDirty();}
}
function onGPS(p){
  const t=Date.now(),lat=p.coords.latitude,lon=p.coords.longitude;
  if(NAV.prevLat!=null){
    const dt=(t-NAV.prevT)/1000;
    if(dt>0.4){
      const d=haversine(NAV.prevLat,NAV.prevLon,lat,lon);
      NAV.sog=kfSog.update(d/dt*3600*0.539957);
      NAV.cog=bearing(NAV.prevLat,NAV.prevLon,lat,lon);
      if(!NAV.hdg)NAV.hdg=NAV.cog;
    }
  }
  NAV.lat=lat;NAV.lon=lon;NAV.prevLat=lat;NAV.prevLon=lon;NAV.prevT=t;
  NAV.track.push({lat,lon,t});if(NAV.track.length>300)NAV.track.shift();
  pill('pGPS','ok');setDirty();
}

function selSeq(n){

function startGun(){
  let mins=selSeqVal===0?parseInt(document.getElementById('customMins').value)||5:selSeqVal;
  RACE.seq=mins;RACE.epoch=Date.now()+mins*60000;RACE.active=true;

  tickGun();document.getElementById('btnTimer').classList.add('on');

}
function syncGun(){
  if(!RACE.active||!RACE.epoch){toast('Start sequence first');return;}
  const rem=RACE.epoch-Date.now();
  RACE.epoch=Date.now()+Math.round(rem/60000)*60000;
  closeModal('mTimer');toast('Synced to minute');
}
function stopGun(){
  if(gunInt)clearInterval(gunInt);
  RACE.active=false;RACE.epoch=null;
  document.getElementById('gunBar').className='gun-bar';
  document.getElementById('btnTimer').classList.remove('on');
  updateAll();
}
function tickGun(){
  if(!RACE.active||!RACE.epoch)return;
  const rem=RACE.epoch-Date.now();
  const bar=document.getElementById('gunBar');
  if(rem<=0){
    document.getElementById('gunTime').textContent='GO!';
    document.getElementById('gunPhase').textContent='RACING';
    bar.className='gun-bar vis go';
    if(rem<-4000)stopGun();return;
  }
  const ts=Math.ceil(rem/1000),m=Math.floor(ts/60),s=ts%60;
  document.getElementById('gunTime').textContent=`${m}:${String(s).padStart(2,'0')}`;
  bar.className='gun-bar vis '+(ts<=60?'final':'prep');
  document.getElementById('gunPhase').textContent=ts>60?`${Math.ceil(ts/60)} MIN`:(ts<=10?'FINAL!':'1 MIN');
  setDirty();
}

  if(!RACE.active||!RACE.epoch)return;
  const rem=RACE.epoch-Date.now();RACE.epoch=Date.now()+Math.round(rem/60000)*60000;toast('Synced');
};

function updateAll(){
  updateInstruments();updateStartUI();updateTactics();updateMarkAdvance();renderWindRose();

function updateInstruments(){
  const h=NAV.hdg;
  el('iHDG').textContent=h!=null?Math.round(h):'---';
  el('iSOG').textContent=NAV.sog.toFixed(1);
  const twa=(WIND.twd!=null&&h!=null)?Math.round(angDiff(WIND.twd,h)):null;
  el('iTWA').textContent=twa!=null?twa+'°':'---';
  el('iTWS').textContent=WIND.tws!=null?WIND.tws.toFixed(1):'--';
  // VMG label and value
  if(COURSE.activeMark>=0){
    const tac=computeTactics();
    el('iVMG').textContent=tac?tac.bestVMG.toFixed(1):'--';
    el('iVMGlbl').textContent='VMG kt';
  }else{
    // Pre-start: show burn time
    const m=computeStartMetrics();
    if(m&&isFinite(m.burn)){
      el('iVMG').textContent=fmtT(m.burn);
      el('iVMG').className='iv '+(m.burn<0?'crit':m.burn<15?'warn':'hi');
      el('iVMGlbl').textContent='BURN';
    }else{el('iVMG').textContent='--';el('iVMGlbl').textContent='BURN';}
  }
  // XTE badge
  if(COURSE.activeMark>=0){
    const xte=computeXTE();
    if(xte!==null){
      const xteM=Math.round(Math.abs(xte));
      const side=xte>0?'R':'L';
      el('xteVal').textContent=`${xteM}m ${side}`;
      el('xteVal').className='xte-val'+(xteM>50?' warn':xteM>100?' crit':'');
      el('xteBadge').style.display='block';
    }
  }else el('xteBadge').style.display='none';
  // Wind badge text
  el('wbSpd').textContent=WIND.tws!=null?Math.round(WIND.tws)+'kt':'--kt';
  el('wbDir').textContent=WIND.twd!=null?Math.round(WIND.twd)+'°':'---°';
  const tr=windTrend();
  const te=el('wbTrend');
  if(tr.t==='NO DATA'||tr.t==='STEADY'){te.textContent=tr.t;te.className='wb-trend';}
  else if(tr.t==='LEFT'){te.textContent=`← ${tr.d}° LEFT`;te.className='wb-trend lift';}
  else{te.textContent=`→ ${tr.d}° RIGHT`;te.className='wb-trend hdr';}
}

function updateTactics(){
  const rec=el('tackRec');
  if(COURSE.activeMark<0){
    // Pre-start
    const m=computeStartMetrics();
    if(m){
      rec.textContent=`LINE ${Math.round(m.distM)}m  TTL ${fmtT(m.ttl)}`;
      rec.className=`tack-rec ${m.burn<0?'port':m.burn<15?'stbd':'none'}`;
    }else{rec.textContent='SET COURSE & WIND';rec.className='tack-rec none';}
    drawEff(0);return;
  }
  const tac=computeTactics();
  if(!tac){rec.textContent='SET COURSE & WIND';rec.className='tack-rec none';drawEff(0);return;}
  if(tac.leg==='upwind'){
    const note=tac.shiftNote?` · ${tac.shiftNote}`:'';
    rec.textContent=`${tac.best==='stbd'?'▶ STBD':'◀ PORT'} ${Math.round(tac.bestHdg)}° · VMG ${tac.bestVMG.toFixed(1)}kt${note}`;
    rec.className=`tack-rec ${tac.best}`;
    drawEff(tac.eff);
  }else if(tac.leg==='downwind'){
    rec.textContent=`${tac.best==='stbd'?'▶ STBD GYBE':'◀ PORT GYBE'} ${Math.round(tac.bestHdg)}° · VMG ${tac.bestVMG.toFixed(1)}kt`;
    rec.className=`tack-rec ${tac.best}`;drawEff(tac.eff);
  }else{
    rec.textContent=`REACH ${Math.round(tac.bestHdg)}° · ${tac.note||''}`;
    rec.className='tack-rec reach';drawEff(tac.eff);
  }
  // Leg badge
  const lb=el('legBadge');
  if(tac){
    const mark=COURSE.waypoints[COURSE.activeMark];
    const dist=distToActiveMark();
    lb.textContent=`TO ${mark.label} · ${(dist/1852).toFixed(2)}nm · ${tac.leg.toUpperCase()}`;
    lb.style.display='block';
  }else lb.style.display='none';
}

function updateStartUI(){
  const isStart=COURSE.activeMark<0;
  el('startBar').classList.toggle('vis',isStart&&!!(COURSE.pinA&&COURSE.pinB));
  el('commitBar').classList.toggle('vis',isStart&&RACE.active);
  if(!isStart)return;
  const m=computeStartMetrics();
  if(!m){
    ['slDist','slBurn','slFav','commitVal'].forEach(id=>el(id).textContent='--');
    el('commitDesc').textContent='SET PINS & TIMER';return;
  }
  el('slDist').textContent=Math.round(m.distM)+'m';
  const bEl=el('slBurn'),bRow=el('slBurnRow');
  if(isFinite(m.burn)){
    bEl.textContent=(m.burn>=0?'+':'')+fmtT(m.burn);
    bRow.className='sld '+(m.burn<0?'crit':m.burn<15?'warn':'ok');
  }else{bEl.textContent='NO TMR';bRow.className='sld';}
  el('slFav').textContent=m.favored?`${m.favored} +${Math.round(m.biasM)}m`:'NO WIND';
  const cb=el('commitBar'),cv=el('commitVal'),cd=el('commitDesc');
  if(m.isOver){cb.className='commit-bar vis late';cv.textContent='OCS!';cd.textContent='OVER EARLY - DUCK';}
  else if(!RACE.active){cv.textContent='--:--';cd.textContent='START TIMER FIRST';}
  else if(m.commitIn<0){cb.className='commit-bar vis late';cv.textContent='GO NOW';cd.textContent=approachStr(m);}
  else if(m.commitIn<20){cb.className='commit-bar vis go';cv.textContent=fmtT(m.commitIn);cd.textContent='COMMIT — '+approachStr(m);}
  else{cb.className='commit-bar vis';cv.textContent=fmtT(m.commitIn);cd.textContent=approachStr(m);}
  drawStartLine(m);
}

function approachStr(m){
  if(!m.favEnd||WIND.twd==null)return'';
  const fb=bearing(NAV.lat,NAV.lon,m.favEnd.lat,m.favEnd.lon);
  const twa=angDiff(WIND.twd,fb);
  return`FAV ${m.favored} · ${twa>0?'PORT':'STBD'} · ${m.approachSpd.toFixed(1)}kt`;
}

function updateMarkAdvance(){
  const ma=el('markAdvance');
  const tgt=activeMark();
  if(!tgt||NAV.lat===null){ma.classList.remove('vis');return;}
  const dist=distToActiveMark();
  const close=dist<150; // within 150m
  ma.classList.toggle('vis',close);
  if(close)el('maLabel').textContent=`APPROACHING MARK ${tgt.label} · ${Math.round(dist)}m · LEAVE TO ${tgt.rounding.toUpperCase()}`;
}

// ── START LINE SCHEMATIC ──────────────────────────────────────
function drawStartLine(m){
  const c=el('cvLine'),W=c.parentElement.clientWidth,H=30;
  c.width=W*devicePixelRatio;c.height=H*devicePixelRatio;c.style.width=W+'px';c.style.height=H+'px';
  const x=c.getContext('2d');x.scale(devicePixelRatio,devicePixelRatio);
  x.clearRect(0,0,W,H);
  const mg=16,lw=W-mg*2,cy=H/2;
  x.strokeStyle='rgba(245,166,35,0.7)';x.lineWidth=2;
  x.beginPath();x.moveTo(mg,cy);x.lineTo(mg+lw,cy);x.stroke();
  [[mg,'A'],[mg+lw,'B']].forEach(([px,lbl])=>{
    x.fillStyle='#f5a623';x.beginPath();x.arc(px,cy,5,0,2*Math.PI);x.fill();
    x.fillStyle='#000';x.font='bold 7px Space Mono,monospace';x.textAlign='center';x.textBaseline='middle';
    x.fillText(lbl,px,cy+0.5);
  });
  if(m.favored){
    const fx=m.favored==='A'?mg:mg+lw;
    x.strokeStyle='rgba(61,220,132,0.8)';x.lineWidth=3;
    x.beginPath();x.arc(fx,cy,9,0,2*Math.PI);x.stroke();
  }
  const bx=mg+lw*Math.max(0.02,Math.min(0.98,m.pctAlong/100));
  const bc=m.isOver?'#e84040':(m.burn<0?'#e84040':m.burn<15?'#f5a623':'#00d4aa');
  x.fillStyle=bc;x.beginPath();x.arc(bx,cy-10,5,0,2*Math.PI);x.fill();
  x.strokeStyle=bc;x.lineWidth=1.5;x.setLineDash([2,2]);
  x.beginPath();x.moveTo(bx,cy-5);x.lineTo(bx,cy);x.stroke();x.setLineDash([]);
}

// ── EFF RING ─────────────────────────────────────────────────
function drawEff(eff){
  const c=el('cvEff'),x=c.getContext('2d'),W=40,cx=20,cy=20,r=15;
  x.clearRect(0,0,W,W);
  x.strokeStyle='rgba(0,212,170,0.1)';x.lineWidth=3;
  x.beginPath();x.arc(cx,cy,r,0,2*Math.PI);x.stroke();
  if(eff>0){
    const col=eff>80?'#3ddc84':eff>50?'#00d4aa':'#f5a623';
    x.strokeStyle=col;x.lineWidth=3;
    x.beginPath();x.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+eff/100*2*Math.PI);x.stroke();
  }
  x.fillStyle=eff>0?'rgba(0,212,170,0.85)':'rgba(61,90,114,0.6)';
  x.font='bold 8px Space Mono,monospace';x.textAlign='center';x.textBaseline='middle';
  x.fillText(eff>0?Math.round(eff)+'%':'--',cx,cy);
}

// ── WIND ROSE ─────────────────────────────────────────────────
function renderWindRose(){
  const c=el('cvWind'),x=c.getContext('2d'),W=56,cx=28,cy=28,r=24;
  x.clearRect(0,0,W,W);
  x.fillStyle='rgba(5,13,24,0.7)';x.beginPath();x.arc(cx,cy,r,0,2*Math.PI);x.fill();
  x.strokeStyle='rgba(0,212,170,0.12)';x.lineWidth=1;x.beginPath();x.arc(cx,cy,r,0,2*Math.PI);x.stroke();
  if(WIND.twd==null){
    x.fillStyle='rgba(61,90,114,0.7)';x.font='bold 7px Space Mono,monospace';
    x.textAlign='center';x.textBaseline='middle';x.fillText('NO WND',cx,cy);return;
  }
  const rad=(WIND.twd-90)*Math.PI/180;
  const ex=cx+Math.cos(rad)*r*0.8,ey=cy+Math.sin(rad)*r*0.8;
  x.strokeStyle='#f5a623';x.lineWidth=2;
  x.beginPath();x.moveTo(cx,cy);x.lineTo(ex,ey);x.stroke();
  x.save();x.translate(ex,ey);x.rotate(rad+Math.PI/2);x.fillStyle='#f5a623';
  x.beginPath();x.moveTo(0,0);x.lineTo(-3,8);x.lineTo(3,8);x.closePath();x.fill();x.restore();
  const barbs=Math.min(Math.round((WIND.tws||0)/5),5);
  for(let b=0;b<barbs;b++){
    const bt=0.2+b*0.15,bx=cx+Math.cos(rad)*r*0.8*bt,by=cy+Math.sin(rad)*r*0.8*bt;
    const p=rad-Math.PI/2;
    x.strokeStyle='rgba(245,166,35,0.65)';x.lineWidth=1.5;
    x.beginPath();x.moveTo(bx,by);x.lineTo(bx+Math.cos(p)*6,by+Math.sin(p)*6);x.stroke();
  }
}

// ── CHART RENDER ──────────────────────────────────────────────
function getBounds(){
  const pts=[];
  if(COURSE.pinA)pts.push(COURSE.pinA);if(COURSE.pinB)pts.push(COURSE.pinB);
  COURSE.waypoints.forEach(w=>pts.push(w));
  if(COURSE.finA)pts.push(COURSE.finA);if(COURSE.finB)pts.push(COURSE.finB);
  if(NAV.lat)pts.push({lat:NAV.lat,lon:NAV.lon});
  if(!pts.length)return null;
  let s=Infinity,n=-Infinity,w=Infinity,e=-Infinity;
  pts.forEach(p=>{s=Math.min(s,p.lat);n=Math.max(n,p.lat);w=Math.min(w,p.lon);e=Math.max(e,p.lon);});
  const pLat=Math.max((n-s)*0.35,0.005),pLon=Math.max((e-w)*0.35,0.006);
  return{s:s-pLat,n:n+pLat,w:w-pLon,e:e+pLon};
}
function proj(lat,lon,b,W,H){
  const rx=(lon-b.w)/(b.e-b.w),ry=1-(lat-b.s)/(b.n-b.s);
  return{x:(rx*VIEW.scale+VIEW.offX*VIEW.scale)*W,y:(ry*VIEW.scale+VIEW.offY*VIEW.scale)*H};
}

function render(){
  if(!dirty)return;dirty=false;
  const W=cvM.width/devicePixelRatio,H=cvM.height/devicePixelRatio;
  const b=getBounds();
  if(b)renderTiles(b,W,H);
  else{ctxT.save();ctxT.scale(devicePixelRatio,devicePixelRatio);ctxT.clearRect(0,0,W,H);ctxT.restore();}
  ctxM.save();ctxM.scale(devicePixelRatio,devicePixelRatio);ctxM.clearRect(0,0,W,H);
  if(!b){
    ctxM.fillStyle='#080f1e';ctxM.fillRect(0,0,W,H);
    ctxM.fillStyle='rgba(0,212,170,0.18)';ctxM.font='700 15px Barlow Condensed,sans-serif';
    ctxM.textAlign='center';ctxM.textBaseline='middle';
    ctxM.fillText('TAP COURSE TO SET UP',W/2,H/2-14);
    ctxM.fillStyle='rgba(61,90,114,0.7)';ctxM.font='13px Barlow Condensed,sans-serif';
    ctxM.fillText('or DEMO to preview',W/2,H/2+12);
    ctxM.restore();return;
  }
  const p=(la,lo)=>proj(la,lo,b,W,H);
  // Dark overlay over tiles
  ctxM.fillStyle='rgba(5,13,24,0.36)';ctxM.fillRect(0,0,W,H);

  // ── Wind corridor from active mark ──
  const tgtMark=activeMark()||(COURSE.waypoints[0]??null);
  if(WIND.twd!=null&&tgtMark){
    const mk=p(tgtMark.lat,tgtMark.lon);
    const rad=(WIND.twd+180)*Math.PI/180,len=Math.max(W,H)*0.65,hw=44;
    const px=Math.cos(rad),py=-Math.sin(rad),ox=-py,oy=px;
    ctxM.save();
    const g=ctxM.createLinearGradient(mk.x,mk.y,mk.x+px*len,mk.y+py*len);
    g.addColorStop(0,'rgba(0,212,170,0.07)');g.addColorStop(1,'rgba(0,212,170,0)');
    ctxM.fillStyle=g;ctxM.beginPath();
    ctxM.moveTo(mk.x+ox*hw,mk.y+oy*hw);ctxM.lineTo(mk.x+px*len+ox*hw,mk.y+py*len+oy*hw);
    ctxM.lineTo(mk.x+px*len-ox*hw,mk.y+py*len-oy*hw);ctxM.lineTo(mk.x-ox*hw,mk.y-oy*hw);
    ctxM.closePath();ctxM.fill();ctxM.restore();
  }

  // ── Laylines (upwind leg) ──
  const tac=computeTactics();
  if(tac&&tac.leg==='upwind'&&tgtMark){
    const mk=p(tgtMark.lat,tgtMark.lon),len=Math.max(W,H)*1.6;
    ctxM.setLineDash([5,5]);ctxM.lineWidth=1.2;
    ctxM.strokeStyle='rgba(61,220,132,0.25)';
    const sR=tac.layS*Math.PI/180;
    ctxM.beginPath();ctxM.moveTo(mk.x,mk.y);ctxM.lineTo(mk.x+Math.sin(sR)*len,mk.y-Math.cos(sR)*len);ctxM.stroke();
    ctxM.strokeStyle='rgba(232,64,64,0.25)';
    const pR=tac.layP*Math.PI/180;
    ctxM.beginPath();ctxM.moveTo(mk.x,mk.y);ctxM.lineTo(mk.x+Math.sin(pR)*len,mk.y-Math.cos(pR)*len);ctxM.stroke();
    ctxM.setLineDash([]);
  }

  // ── Course route (rhumb lines between marks) ──
  if(COURSE.waypoints.length>0){
    ctxM.strokeStyle='rgba(0,212,170,0.2)';ctxM.lineWidth=1.5;ctxM.setLineDash([4,4]);
    ctxM.beginPath();
    const start=COURSE.pinA?p(COURSE.pinA.lat,(COURSE.pinA.lon+COURSE.pinB.lon)/2):null;
    if(start)ctxM.moveTo(start.x,start.y);
    COURSE.waypoints.forEach((w,i)=>{
      const wp=p(w.lat,w.lon);
      if(i===0&&!start)ctxM.moveTo(wp.x,wp.y);
      else ctxM.lineTo(wp.x,wp.y);
    });
    ctxM.stroke();ctxM.setLineDash([]);
  }

  // ── Desired (optimal) track ──
  const dt=computeDesiredTrack();
  if(dt.length>1&&NAV.lat){
    const col=tac?(tac.best==='stbd'?'rgba(61,220,132,0.7)':tac.best==='port'?'rgba(232,64,64,0.7)':'rgba(74,158,255,0.7)'):'rgba(0,212,170,0.5)';
    ctxM.strokeStyle=col;ctxM.lineWidth=2;ctxM.setLineDash([8,4]);
    ctxM.beginPath();
    dt.forEach((pt,i)=>{const pp=p(pt.lat,pt.lon);i===0?ctxM.moveTo(pp.x,pp.y):ctxM.lineTo(pp.x,pp.y);});
    ctxM.stroke();ctxM.setLineDash([]);
    // Tack/gybe point
    if(dt.length===3){
      const tp=p(dt[1].lat,dt[1].lon);
      ctxM.fillStyle=col;ctxM.beginPath();ctxM.arc(tp.x,tp.y,4,0,2*Math.PI);ctxM.fill();
    }
  }

  // ── Actual track (breadcrumbs) ──
  if(NAV.track.length>1){
    ctxM.strokeStyle='rgba(0,212,170,0.3)';ctxM.lineWidth=1.5;
    ctxM.beginPath();
    NAV.track.forEach((pt,i)=>{const pp=p(pt.lat,pt.lon);i===0?ctxM.moveTo(pp.x,pp.y):ctxM.lineTo(pp.x,pp.y);});
    ctxM.stroke();
    // Dots every 5th point
    ctxM.fillStyle='rgba(0,212,170,0.25)';
    NAV.track.filter((_,i)=>i%5===0).forEach(pt=>{
      const pp=p(pt.lat,pt.lon);ctxM.beginPath();ctxM.arc(pp.x,pp.y,2,0,2*Math.PI);ctxM.fill();
    });
  }

  // ── Start line ──
  if(COURSE.pinA&&COURSE.pinB){
    const a=p(COURSE.pinA.lat,COURSE.pinA.lon),bpt=p(COURSE.pinB.lat,COURSE.pinB.lon);
    ctxM.strokeStyle='rgba(245,166,35,0.85)';ctxM.lineWidth=2.5;
    ctxM.beginPath();ctxM.moveTo(a.x,a.y);ctxM.lineTo(bpt.x,bpt.y);ctxM.stroke();
    drawBuoy(a.x,a.y,'square','#f5a623','A');
    drawBuoy(bpt.x,bpt.y,'circle','#f5a623','B');
    const sm=computeStartMetrics();
    if(sm&&sm.favored){
      const fv=sm.favored==='A'?a:bpt;
      ctxM.strokeStyle='rgba(61,220,132,0.75)';ctxM.lineWidth=2.5;
      ctxM.beginPath();ctxM.arc(fv.x,fv.y,13,0,2*Math.PI);ctxM.stroke();
    }
  }

  // ── RC Marks ──
  COURSE.waypoints.forEach((w,i)=>{
    const wp=p(w.lat,w.lon);
    const isActive=i===COURSE.activeMark;
    const col=isActive?'#00d4aa':'#ffdf00';
    drawBuoy(wp.x,wp.y,'diamond',col,w.label);
    if(isActive){
      ctxM.strokeStyle='rgba(0,212,170,0.5)';ctxM.lineWidth=2;
      ctxM.beginPath();ctxM.arc(wp.x,wp.y,16,0,2*Math.PI);ctxM.stroke();
    }
    // Rounding arrow
    if(w.rounding!=='none'){
      const arCol=w.rounding==='port'?'rgba(232,64,64,0.6)':'rgba(61,220,132,0.6)';
      ctxM.fillStyle=arCol;ctxM.font='11px sans-serif';ctxM.textAlign='center';ctxM.textBaseline='middle';
      ctxM.fillText(w.rounding==='port'?'↺':'↻',wp.x+12,wp.y-12);
    }
  });

  // ── Finish line ──
  const fa=COURSE.finA??COURSE.pinA,fb=COURSE.finB??COURSE.pinB;
  const isLastMark=COURSE.activeMark===COURSE.waypoints.length-1;
  if(fa&&fb&&COURSE.waypoints.length>0&&isLastMark){
    const fpa=p(fa.lat,fa.lon),fpb=p(fb.lat,fb.lon);
    ctxM.strokeStyle='rgba(74,158,255,0.8)';ctxM.lineWidth=2.5;
    ctxM.beginPath();ctxM.moveTo(fpa.x,fpa.y);ctxM.lineTo(fpb.x,fpb.y);ctxM.stroke();
    ctxM.fillStyle='rgba(74,158,255,0.6)';ctxM.font='10px Barlow Condensed,sans-serif';
    ctxM.textAlign='left';ctxM.textBaseline='bottom';
    ctxM.fillText('FINISH',Math.min(fpa.x,fpb.x),Math.min(fpa.y,fpb.y)-3);
  }

  // ── Boat ──
  if(NAV.lat){
    const bp=p(NAV.lat,NAV.lon);
    drawBoat(bp.x,bp.y,(NAV.hdg??NAV.cog??0)*Math.PI/180);
    // Heading vector
    if(NAV.hdg!=null){
      const hr=NAV.hdg*Math.PI/180,vlen=30;
      ctxM.strokeStyle='rgba(0,212,170,0.35)';ctxM.lineWidth=1.5;ctxM.setLineDash([3,3]);
      ctxM.beginPath();ctxM.moveTo(bp.x,bp.y);
      ctxM.lineTo(bp.x+Math.sin(hr)*vlen,bp.y-Math.cos(hr)*vlen);ctxM.stroke();ctxM.setLineDash([]);
    }
  }

  // ── Scale bar + N ──
  ctxM.fillStyle='rgba(0,212,170,0.45)';ctxM.font='bold 10px Space Mono,monospace';
  ctxM.textAlign='left';ctxM.textBaseline='top';ctxM.fillText('N↑',8,8);
  const lSpan=(b.n-b.s)/VIEW.scale,nmSpan=lSpan*60;
  const barNM=nmSpan<0.2?0.05:nmSpan<0.8?0.1:nmSpan<3?0.5:1;
  const barPx=(barNM/nmSpan)*H;
  ctxM.strokeStyle='rgba(255,255,255,0.3)';ctxM.lineWidth=1.5;
  ctxM.beginPath();ctxM.moveTo(8,H-16);ctxM.lineTo(8+barPx,H-16);ctxM.stroke();
  ctxM.fillStyle='rgba(255,255,255,0.35)';ctxM.font='8px Space Mono,monospace';
  ctxM.textBaseline='bottom';ctxM.fillText(barNM.toFixed(2)+' NM',8,H-4);

  ctxM.restore();
}

function drawBuoy(x,y,shape,col,lbl){
  ctxM.fillStyle=col;ctxM.strokeStyle='rgba(0,0,0,0.5)';ctxM.lineWidth=1;
  if(shape==='circle'){ctxM.beginPath();ctxM.arc(x,y,8,0,2*Math.PI);ctxM.fill();ctxM.stroke();}
  else if(shape==='square'){ctxM.beginPath();ctxM.rect(x-7,y-7,14,14);ctxM.fill();ctxM.stroke();}
  else{ctxM.beginPath();ctxM.moveTo(x,y-10);ctxM.lineTo(x+8,y);ctxM.lineTo(x,y+10);ctxM.lineTo(x-8,y);ctxM.closePath();ctxM.fill();ctxM.stroke();}
  ctxM.fillStyle='#000';ctxM.font='bold 8px Space Mono,monospace';ctxM.textAlign='center';ctxM.textBaseline='middle';ctxM.fillText(lbl,x,y+0.5);
}
function drawBoat(x,y,hdgRad){
  ctxM.save();ctxM.translate(x,y);ctxM.rotate(hdgRad);
  ctxM.shadowColor='#00d4aa';ctxM.shadowBlur=14;ctxM.fillStyle='#00d4aa';
  ctxM.beginPath();ctxM.moveTo(0,-16);ctxM.quadraticCurveTo(7,0,5,12);ctxM.lineTo(0,9);ctxM.lineTo(-5,12);ctxM.quadraticCurveTo(-7,0,0,-16);ctxM.closePath();ctxM.fill();
  ctxM.shadowBlur=0;ctxM.fillStyle='rgba(255,255,255,0.9)';ctxM.beginPath();ctxM.arc(0,-2,2,0,2*Math.PI);ctxM.fill();
  ctxM.restore();
}

// ── MATH UTILS ───────────────────────────────────────────────
function normA(a){return((a%360)+360)%360}
function angDiff(a,b){let d=normA(b-a);return d>180?d-360:d}
function fmtT(s){if(!isFinite(s))return'--:--';const sg=s<0?'-':'';s=Math.abs(Math.round(s));return`${sg}${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}
function haversine(a,b,c,d){const R=6371000,dl=(c-a)*Math.PI/180,dn=(d-b)*Math.PI/180,x=Math.sin(dl/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dn/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function bearing(a,b,c,d){const dn=(d-b)*Math.PI/180,y=Math.sin(dn)*Math.cos(c*Math.PI/180),x=Math.cos(a*Math.PI/180)*Math.sin(c*Math.PI/180)-Math.sin(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.cos(dn);return(Math.atan2(y,x)*180/Math.PI+360)%360}
function midLL(a,b){return{lat:(a.lat+b.lat)/2,lon:(a.lon+b.lon)/2}}
function ll2xy(ref,pt){const R=6371000,l0=ref.lat*Math.PI/180;return{x:(pt.lon-ref.lon)*Math.PI/180*R*Math.cos(l0),y:(pt.lat-ref.lat)*Math.PI/180*R}}

// ── DOM HELPERS ───────────────────────────────────────────────
function el(id){return document.getElementById(id)}
function pill(id,state){el(id).className='pill'+(state?' '+state:'')}
function toast(msg){const t=el('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400)}
function openModal(id){el(id).classList.add('open')}
function closeModal(id){el(id).classList.remove('open')}
function mTab(modal,tab){
  document.querySelectorAll(`#m${modal.charAt(0).toUpperCase()+modal.slice(1)} .tp`).forEach(p=>p.classList.remove('on'));
  document.querySelectorAll(`#m${modal.charAt(0).toUpperCase()+modal.slice(1)} .mtab`).forEach(t=>t.classList.remove('on'));
  el(`${modal}-${tab}`).classList.add('on');
  document.querySelectorAll(`#m${modal.charAt(0).toUpperCase()+modal.slice(1)} .mtab`).forEach(t=>{if(t.getAttribute('onclick')?.includes(`'${tab}'`))t.classList.add('on');});
}
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('open')}));
document.getElementById('finishMode').onchange=function(){el('finishCustom').style.display=this.value==='custom'?'block':'none'};
