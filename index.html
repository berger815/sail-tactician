<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TACTICIAN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

:root {
  --ink:    #060e1c;
  --deep:   #091524;
  --hull:   #0e2038;
  --glass:  rgba(14,32,56,0.92);
  --teal:   #00d4aa;
  --teal2:  #00a888;
  --tealfade: rgba(0,212,170,0.12);
  --amber:  #f5a623;
  --red:    #e84040;
  --green:  #4cde80;
  --white:  #ddeeff;
  --muted:  #4a6880;
  --mono:   'Space Mono', monospace;
  --cond:   'Barlow Condensed', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  height: 100dvh;
  overflow: hidden;
  background: var(--ink);
  color: var(--white);
  font-family: var(--cond);
  touch-action: none;
}

/* ── LAYOUT: 3 rows — header / chart / instruments ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

/* ── HEADER ── */
.hdr {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 14px;
  background: var(--ink);
  border-bottom: 1px solid rgba(0,212,170,0.18);
  gap: 8px;
}
.logo {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.22em;
  color: var(--teal);
  flex-shrink: 0;
}
.pills { display:flex; gap:5px; flex-shrink:0; }
.pill {
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 20px;
  border: 1px solid var(--muted);
  color: var(--muted);
  display: flex; align-items: center; gap: 3px;
  transition: all 0.3s;
}
.pill.ok  { border-color: var(--green); color: var(--green); }
.pill.warn { border-color: var(--amber); color: var(--amber); }
.pdot { width:5px; height:5px; border-radius:50%; background:currentColor; }
.pill.ok .pdot { animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── COUNTDOWN BANNER ── */
.countdown-bar {
  flex-shrink: 0;
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  height: 44px;
  background: var(--hull);
  border-bottom: 1px solid rgba(0,212,170,0.15);
}
.countdown-bar.visible { display: flex; }
.countdown-bar.seq-5 { background: rgba(245,166,35,0.15); border-bottom-color: var(--amber); }
.countdown-bar.seq-4 { background: rgba(245,166,35,0.15); border-bottom-color: var(--amber); }
.countdown-bar.seq-1 { background: rgba(232,64,64,0.15); border-bottom-color: var(--red); }
.countdown-bar.seq-go { background: rgba(76,222,128,0.2); border-bottom-color: var(--green); }

.cd-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--muted);
}
.cd-time {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
  color: var(--teal);
  letter-spacing: 0.05em;
  font-variant-numeric: tabular-nums;
  transition: color 0.3s;
}
.countdown-bar.seq-5 .cd-time,
.countdown-bar.seq-4 .cd-time { color: var(--amber); }
.countdown-bar.seq-1 .cd-time { color: var(--red); }
.countdown-bar.seq-go .cd-time { color: var(--green); font-size: 22px; }
.cd-phase {
  font-family: var(--cond);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-align: right;
}
.cd-btn {
  font-family: var(--mono);
  font-size: 9px;
  padding: 4px 10px;
  border-radius: 3px;
  border: 1px solid var(--teal);
  color: var(--teal);
  background: transparent;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.cd-btn:active { background: var(--tealfade); }

/* ── CHART ── */
.chart-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--deep);
  min-height: 0;
}
#tc { display: block; width: 100%; height: 100%; touch-action: none; }

/* Floating wind badge */
.wind-badge {
  position: absolute;
  top: 10px; right: 10px;
  background: var(--glass);
  border: 1px solid rgba(0,212,170,0.2);
  border-radius: 6px;
  padding: 6px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  pointer-events: none;
}
.wind-badge canvas { display: block; }
.wind-badge-vals {
  display: flex; gap: 8px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--amber);
  font-weight: 700;
}

/* ── INSTRUMENT STRIP ── */
.inst-strip {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid rgba(0,212,170,0.18);
  background: var(--ink);
}
.inst {
  padding: 8px 6px 6px;
  border-right: 1px solid rgba(0,212,170,0.1);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.inst:last-child { border-right: none; }
.inst-val {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
  color: var(--white);
  font-variant-numeric: tabular-nums;
}
.inst-val.hi { color: var(--teal); }
.inst-val.warn { color: var(--amber); }
.inst-lbl {
  font-family: var(--cond);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
}

/* ── TACK RECOMMENDATION ── */
.tack-strip {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 14px;
  background: var(--hull);
  border-top: 1px solid rgba(0,212,170,0.12);
  gap: 8px;
}
.tack-rec {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 5px 12px;
  border-radius: 3px;
  border: 1px solid;
  flex: 1;
  text-align: center;
  transition: all 0.3s;
}
.tack-rec.stbd { background: rgba(76,222,128,0.1); border-color: rgba(76,222,128,0.5); color: var(--green); }
.tack-rec.port { background: rgba(232,64,64,0.1); border-color: rgba(232,64,64,0.5); color: var(--red); }
.tack-rec.none { background: var(--tealfade); border-color: rgba(0,212,170,0.25); color: var(--muted); }

.vmg-block { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; }
.vmg-num { font-family: var(--mono); font-size: 14px; font-weight:700; color: var(--amber); }
.vmg-lbl { font-family: var(--cond); font-size: 9px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
.vmg-arc { flex-shrink:0; }

/* ── BOTTOM TOOLBAR ── */
.toolbar {
  flex-shrink: 0;
  display: flex;
  gap: 0;
  border-top: 1px solid rgba(0,212,170,0.18);
  background: var(--ink);
}
.tbtn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px;
  gap: 3px;
  border-right: 1px solid rgba(0,212,170,0.1);
  cursor: pointer;
  touch-action: manipulation;
  background: transparent;
  border-top: none; border-bottom: none; border-left: none;
  color: var(--muted);
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tbtn:last-child { border-right: none; }
.tbtn:active, .tbtn.on { background: var(--tealfade); color: var(--teal); }
.tbtn.danger:active { background: rgba(232,64,64,0.12); color: var(--red); }
.tbtn svg { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
.tbtn-lbl { font-family: var(--cond); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }

/* ── MODALS ── */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--hull);
  border: 1px solid rgba(0,212,170,0.25);
  border-radius: 12px 12px 0 0;
  padding: 20px 18px 28px;
  width: 100%;
  max-width: 480px;
  max-height: 88dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.modal-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--muted);
  margin: 0 auto 16px;
}
.modal h3 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--teal);
  text-transform: uppercase;
  margin-bottom: 16px;
}

/* tabs inside modal */
.mtabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid rgba(0,212,170,0.15); }
.mtab {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  padding: 7px 14px; border: none; background: transparent;
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  text-transform: uppercase;
  transition: all 0.15s;
}
.mtab.active { color: var(--teal); border-bottom-color: var(--teal); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

.frow { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.frow label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
.frow input, .frow select {
  background: var(--deep);
  border: 1px solid rgba(0,212,170,0.18);
  border-radius: 4px;
  color: var(--white);
  padding: 10px 12px;
  font-family: var(--mono);
  font-size: 13px;
  width: 100%;
  -webkit-appearance: none;
}
.frow input:focus, .frow select:focus { outline: none; border-color: var(--teal); }
.frow-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* polar table */
.polar-table { width: 100%; border-collapse: collapse; }
.polar-table th {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
  color: var(--muted); padding: 4px 6px; text-align: center;
  border-bottom: 1px solid rgba(0,212,170,0.15);
}
.polar-table td {
  padding: 4px 4px;
  text-align: center;
}
.polar-table input {
  width: 100%;
  background: var(--deep);
  border: 1px solid rgba(0,212,170,0.12);
  border-radius: 3px;
  color: var(--white);
  padding: 6px 4px;
  font-family: var(--mono);
  font-size: 12px;
  text-align: center;
  -webkit-appearance: none;
}
.polar-table input:focus { outline: none; border-color: var(--teal); }
.polar-note {
  font-family: var(--cond);
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 12px;
  line-height: 1.4;
}
.polar-preset { margin-bottom: 10px; }

.mbtns { display: flex; gap: 8px; margin-top: 16px; }
.mbtn {
  flex: 1;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  padding: 12px 8px;
  border-radius: 4px;
  border: 1px solid;
  cursor: pointer;
  text-transform: uppercase;
  touch-action: manipulation;
  text-align: center;
}
.mbtn.pri { background: var(--teal); color: var(--ink); border-color: var(--teal); font-weight: 700; }
.mbtn.sec { background: transparent; color: var(--teal); border-color: rgba(0,212,170,0.35); }
.mbtn.dem { background: transparent; color: var(--amber); border-color: rgba(245,166,35,0.35); }
.mbtn.can { background: transparent; color: var(--muted); border-color: rgba(74,104,128,0.35); }

/* Start timer modal */
.timer-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.seq-btn {
  padding: 14px 8px;
  border-radius: 6px;
  border: 1px solid rgba(0,212,170,0.2);
  background: var(--deep);
  color: var(--teal);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  touch-action: manipulation;
}
.seq-btn.selected { background: var(--tealfade); border-color: var(--teal); }
.seq-btn:active { transform: scale(0.96); }
.custom-time-row {
  display: flex; gap: 8px; align-items: center; margin-bottom: 14px;
}
.custom-time-row label { font-family: var(--mono); font-size: 9px; color: var(--muted); white-space: nowrap; letter-spacing: 0.1em; }
.custom-time-row input {
  flex: 1;
  background: var(--deep); border: 1px solid rgba(0,212,170,0.18);
  border-radius: 4px; color: var(--white);
  padding: 9px 10px; font-family: var(--mono); font-size: 13px;
  text-align: center;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--hull);
  border: 1px solid rgba(0,212,170,0.3);
  border-radius: 6px;
  padding: 8px 18px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--teal);
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s;
  z-index: 300;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="logo">TACTICIAN</div>
    <div class="pills">
      <div class="pill" id="gpsPill"><div class="pdot"></div>GPS</div>
      <div class="pill" id="imuPill"><div class="pdot"></div>HDG</div>
      <div class="pill" id="windPill"><div class="pdot"></div>WIND</div>
    </div>
  </div>

  <!-- COUNTDOWN BANNER (hidden until started) -->
  <div class="countdown-bar" id="cdBar">
    <div>
      <div class="cd-label" id="cdPhase">PREP</div>
    </div>
    <div class="cd-time" id="cdTime">5:00</div>
    <button class="cd-btn" id="cdSync">SYNC</button>
    <button class="cd-btn" id="cdStop">✕</button>
  </div>

  <!-- TACTICAL CHART -->
  <div class="chart-wrap" id="chartWrap">
    <canvas id="tc"></canvas>
    <div class="wind-badge" id="windBadge">
      <canvas id="wrCanvas" width="64" height="64"></canvas>
      <div class="wind-badge-vals">
        <span id="wbSpd">--kt</span>
        <span id="wbDir">---°</span>
      </div>
    </div>
  </div>

  <!-- INSTRUMENT STRIP -->
  <div class="inst-strip">
    <div class="inst">
      <div class="inst-val hi" id="iHdg">---</div>
      <div class="inst-lbl">HDG °</div>
    </div>
    <div class="inst">
      <div class="inst-val" id="iSog">0.0</div>
      <div class="inst-lbl">SOG kt</div>
    </div>
    <div class="inst">
      <div class="inst-val" id="iTwa">---</div>
      <div class="inst-lbl">TWA °</div>
    </div>
    <div class="inst">
      <div class="inst-val warn" id="iVmg">--</div>
      <div class="inst-lbl">VMG kt</div>
    </div>
  </div>

  <!-- TACK RECOMMENDATION -->
  <div class="tack-strip">
    <div class="tack-rec none" id="tackRec">SET COURSE TO COMPUTE TACK</div>
    <div class="vmg-block">
      <canvas id="vmgArc" width="44" height="44" class="vmg-arc"></canvas>
      <div class="vmg-lbl">EFF%</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <!-- Sensors -->
    <button class="tbtn" id="btnSensors" onclick="toggleSensors()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M6.3 6.3a8 8 0 0 0 0 11.4"/><path d="M17.7 6.3a8 8 0 0 1 0 11.4"/><path d="M3.5 3.5a14 14 0 0 0 0 17"/><path d="M20.5 3.5a14 14 0 0 1 0 17"/></svg>
      <span class="tbtn-lbl">Sensors</span>
    </button>
    <!-- Wind -->
    <button class="tbtn" id="btnWind" onclick="fetchWind()">
      <svg viewBox="0 0 24 24"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>
      <span class="tbtn-lbl">Wind</span>
    </button>
    <!-- Course -->
    <button class="tbtn" id="btnCourse" onclick="openModal('courseModal')">
      <svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
      <span class="tbtn-lbl">Course</span>
    </button>
    <!-- Polar -->
    <button class="tbtn" id="btnPolar" onclick="openModal('polarModal')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
      <span class="tbtn-lbl">Polar</span>
    </button>
    <!-- Timer -->
    <button class="tbtn" id="btnTimer" onclick="openModal('timerModal')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3 2 6"/><path d="M22 6l-3-3"/><line x1="12" y1="5" x2="12" y2="2"/></svg>
      <span class="tbtn-lbl">Start</span>
    </button>
  </div>

</div><!-- .app -->

<!-- ── COURSE MODAL ── -->
<div class="modal-bg" id="courseModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Course Setup</h3>
    <div class="mtabs">
      <button class="mtab active" onclick="switchTab('course','marks')">Marks</button>
      <button class="mtab" onclick="switchTab('course','options')">Options</button>
    </div>
    <div class="tab-panel active" id="course-marks">
      <div class="frow-2">
        <div class="frow"><label>Pin A Lat</label><input type="number" id="cPinALat" placeholder="17.1285" step="0.0001"></div>
        <div class="frow"><label>Pin A Lon</label><input type="number" id="cPinALon" placeholder="-61.8478" step="0.0001"></div>
      </div>
      <div class="frow-2">
        <div class="frow"><label>Pin B Lat</label><input type="number" id="cPinBLat" placeholder="17.1285" step="0.0001"></div>
        <div class="frow"><label>Pin B Lon</label><input type="number" id="cPinBLon" placeholder="-61.8455" step="0.0001"></div>
      </div>
      <div class="frow-2">
        <div class="frow"><label>Mark Lat</label><input type="number" id="cMarkLat" placeholder="17.1365" step="0.0001"></div>
        <div class="frow"><label>Mark Lon</label><input type="number" id="cMarkLon" placeholder="-61.8466" step="0.0001"></div>
      </div>
      <div class="frow-2">
        <div class="frow"><label>Leeward Lat</label><input type="number" id="cLwLat" placeholder="(optional)" step="0.0001"></div>
        <div class="frow"><label>Leeward Lon</label><input type="number" id="cLwLon" placeholder="(optional)" step="0.0001"></div>
      </div>
    </div>
    <div class="tab-panel" id="course-options">
      <div class="frow">
        <label>Active Leg</label>
        <select id="cLeg">
          <option value="upwind">Upwind (to mark)</option>
          <option value="downwind">Downwind (to leeward)</option>
          <option value="start">Pre-start</option>
        </select>
      </div>
    </div>
    <div class="mbtns">
      <button class="mbtn pri" onclick="saveCourse()">Set Course</button>
      <button class="mbtn dem" onclick="loadDemo()">Demo</button>
      <button class="mbtn can" onclick="closeModal('courseModal')">Cancel</button>
    </div>
  </div>
</div>

<!-- ── POLAR MODAL ── -->
<div class="modal-bg" id="polarModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Boat Polar</h3>
    <div class="frow polar-preset">
      <label>Load Preset</label>
      <select id="polarPreset" onchange="loadPolarPreset()">
        <option value="">— custom —</option>
        <option value="hobie18">Hobie 18 (cat)</option>
        <option value="j24">J/24</option>
        <option value="laser">Laser / ILCA</option>
        <option value="420">420 / dinghy</option>
        <option value="cruiser">Cruiser-Racer 35ft</option>
      </select>
    </div>
    <div class="polar-note">Enter boat speed (knots) for each wind speed + angle combination. TWA = true wind angle from bow.</div>
    <table class="polar-table" id="polarTable">
      <thead>
        <tr>
          <th>TWA °</th>
          <th>6 kt</th>
          <th>10 kt</th>
          <th>14 kt</th>
          <th>20 kt</th>
        </tr>
      </thead>
      <tbody id="polarBody"></tbody>
    </table>
    <div class="mbtns">

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const S = {
  heading: null, lat: null, lon: null,
  sog: 0, cog: null,
  twd: null, tws: null,
  waveHt: null, wavePer: null,
  pinA: null, pinB: null,
  mark: null, lwMark: null,
  activeLeg: 'upwind',
  track: [],
  prevLat: null, prevLon: null, prevGpsT: null,
  polar: null,       // parsed polar table
  polarAngles: [],   // upwind optimal angles per TWS
  demoInterval: null,
  demoT: 0,
};

// Race countdown
const CD = {
  active: false,
  startEpoch: null,    // epoch ms when gun fires
  totalMs: 5 * 60000,
  seq: 5,
  phase: '',
};

// Polar presets  [TWA: [6kt, 10kt, 14kt, 20kt]]
const PRESETS = {
  hobie18:  { name:'Hobie 18', rows: [[40,5.2,7.8,9.1,9.4],[52,5.8,8.4,9.8,10.2],[70,6.2,8.0,9.0,9.3],[90,5.9,7.5,8.4,8.7],[110,5.6,7.8,9.2,9.6],[135,5.0,7.0,8.5,9.0],[150,4.5,6.5,7.8,8.3]] },
  j24:      { name:'J/24',     rows: [[40,3.8,5.4,6.1,6.3],[52,4.1,5.8,6.5,6.7],[70,4.4,5.6,6.3,6.5],[90,4.2,5.4,6.1,6.3],[110,4.0,5.6,6.8,7.0],[135,3.6,5.2,6.5,6.7],[150,3.2,4.8,6.0,6.2]] },
  laser:    { name:'Laser',    rows: [[40,3.0,4.2,4.8,4.6],[52,3.3,4.6,5.1,4.9],[70,3.5,4.4,4.9,4.7],[90,3.3,4.2,4.7,4.5],[110,3.1,4.4,5.2,5.0],[135,2.8,4.0,4.9,4.7],[150,2.5,3.7,4.5,4.3]] },
  '420':    { name:'420',      rows: [[40,3.2,4.6,5.3,5.1],[52,3.5,5.0,5.7,5.5],[70,3.7,4.8,5.5,5.3],[90,3.5,4.6,5.2,5.0],[110,3.3,4.8,5.8,5.6],[135,3.0,4.4,5.4,5.2],[150,2.7,4.0,5.0,4.8]] },
  cruiser:  { name:'Cruiser 35',rows: [[42,4.2,5.8,6.4,6.5],[52,4.5,6.1,6.7,6.8],[70,4.7,6.0,6.6,6.7],[90,4.5,5.9,6.6,6.7],[110,4.3,6.0,7.0,7.2],[135,3.9,5.6,6.8,7.0],[150,3.5,5.1,6.3,6.5]] },
};

const POLAR_TWS = [6, 10, 14, 20];
const DEFAULT_ANGLES = [40, 52, 70, 90, 110, 135, 150];

// ═══════════════════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════════════════
const tc = document.getElementById('tc');
const ctx = tc.getContext('2d');

function resizeTC() {
  const w = tc.parentElement.clientWidth;
  const h = tc.parentElement.clientHeight;
  tc.width = w * devicePixelRatio;
  tc.height = h * devicePixelRatio;
  tc.style.width = w + 'px';
  tc.style.height = h + 'px';
  render();
}
window.addEventListener('resize', resizeTC);
// Use ResizeObserver for better mobile coverage
if (window.ResizeObserver) {
  new ResizeObserver(resizeTC).observe(document.getElementById('chartWrap'));
}
resizeTC();

// ═══════════════════════════════════════════════════════
// SENSOR MANAGEMENT
// ═══════════════════════════════════════════════════════
let sensorsOn = false;
let gpsWatcher = null;

async function toggleSensors() {
  if (sensorsOn) {
    stopSensors(); return;
  }
  await startSensors();
}

async function startSensors() {
  const btn = document.getElementById('btnSensors');
  btn.classList.add('on');

  // GPS
  if ('geolocation' in navigator) {
    gpsWatcher = navigator.geolocation.watchPosition(onGPS, onGPSErr, {
      enableHighAccuracy: true, maximumAge: 1000, timeout: 15000
    });
  } else {
    setPill('gpsPill','warn');
  }

  // Compass / IMU
  if (window.DeviceOrientationEvent) {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const r = await DeviceOrientationEvent.requestPermission();
        if (r === 'granted') listenOrientation();
        else setPill('imuPill','warn');
      } catch(e) { setPill('imuPill','warn'); }
    } else {
      listenOrientation();
    }
  } else {
    setPill('imuPill','warn');
  }

  sensorsOn = true;
  toast('Sensors started');
}

function stopSensors() {
  if (gpsWatcher !== null) navigator.geolocation.clearWatch(gpsWatcher);
  window.removeEventListener('deviceorientationabsolute', onOrientation, true);
  window.removeEventListener('deviceorientation', onOrientation, true);
  sensorsOn = false;
  document.getElementById('btnSensors').classList.remove('on');
  setPill('gpsPill','off'); setPill('imuPill','off');
  toast('Sensors stopped');
}

function listenOrientation() {
  window.addEventListener('deviceorientationabsolute', onOrientation, true);
  window.addEventListener('deviceorientation', onOrientation, true);
}

function onOrientation(e) {
  let h = null;
  if (e.absolute && e.alpha !== null) h = (360 - e.alpha + 360) % 360;
  else if (e.webkitCompassHeading != null) h = e.webkitCompassHeading;
  if (h !== null) {
    S.heading = h;
    setPill('imuPill','ok');
    updateInstruments();
  }
}

function onGPS(pos) {
  const t = Date.now();
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  if (S.prevLat !== null && S.prevGpsT !== null) {
    const dt = (t - S.prevGpsT) / 1000;
    if (dt > 0.5) {
      const d = haversine(S.prevLat, S.prevLon, lat, lon);
      S.sog = (d / dt) * 3600 * 0.539957;
      S.cog = bearing(S.prevLat, S.prevLon, lat, lon);
      if (!S.heading) S.heading = S.cog;
    }
  }
  S.lat = lat; S.lon = lon;
  S.prevLat = lat; S.prevLon = lon; S.prevGpsT = t;
  S.track.push({lat, lon});
  if (S.track.length > 150) S.track.shift();
  setPill('gpsPill','ok');
  updateInstruments(); render();
}
function onGPSErr() { setPill('gpsPill','warn'); }

// ═══════════════════════════════════════════════════════
// WIND FETCH
// ═══════════════════════════════════════════════════════
async function fetchWind() {
  const btn = document.getElementById('btnWind');
  btn.classList.add('on');
  const lat = S.lat || 17.1285;
  const lon = S.lon || -61.8466;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}&current=wind_speed_10m,wind_direction_10m&hourly=wave_height,wave_period&wind_speed_unit=kn&forecast_days=1`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.current) { S.tws = d.current.wind_speed_10m; S.twd = d.current.wind_direction_10m; }
    if (d.hourly?.wave_height) { S.waveHt = d.hourly.wave_height[0]; S.wavePer = d.hourly.wave_period?.[0] ?? null; }
    setPill('windPill','ok');
    toast('Wind data updated');
    btn.classList.remove('on');
    updateInstruments(); render(); renderWindRose();
  } catch(e) {
    setPill('windPill','warn');
    toast('Wind fetch failed — check connection');
    btn.classList.remove('on');
  }
}

// ═══════════════════════════════════════════════════════
// COURSE
// ═══════════════════════════════════════════════════════
function saveCourse() {
  const v = (id) => { const n = parseFloat(document.getElementById(id).value); return isNaN(n) ? null : n; };
  const aLat = v('cPinALat'), aLon = v('cPinALon');

  const lLat = v('cLwLat'),   lLon = v('cLwLon');

  if (!aLat || !bLat || !mLat) { toast('Enter at least both pins and mark'); return; }

  S.pinA = {lat:aLat, lon:aLon};
  S.pinB = {lat:bLat, lon:bLon};
  S.mark = {lat:mLat, lon:mLon};
  S.lwMark = (lLat && lLon) ? {lat:lLat, lon:lLon} : null;
  S.activeLeg = document.getElementById('cLeg').value;

  if (!S.lat) {
    const mid = midpoint(S.pinA, S.pinB);
    S.lat = mid.lat - 0.0015; S.lon = mid.lon;
  }

}

// ═══════════════════════════════════════════════════════
// POLAR TABLE
// ═══════════════════════════════════════════════════════
function buildPolarTable(rows) {
  const tbody = document.getElementById('polarBody');
  tbody.innerHTML = '';
  rows.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:4px 2px">${row[0]}°</td>`;
    for (let i = 1; i <= 4; i++) {
      tr.innerHTML += `<td><input type="number" step="0.1" min="0" max="20" data-twa="${row[0]}" data-twsi="${i-1}" value="${row[i]}"></td>`;
    }
    tbody.appendChild(tr);
  });
}

// Init with default angles and blank values
function initPolarTable() {
  buildPolarTable(DEFAULT_ANGLES.map(a => [a, '', '', '', '']));
}

function loadPolarPreset() {
  const key = document.getElementById('polarPreset').value;
  if (!key || !PRESETS[key]) { initPolarTable(); return; }
  buildPolarTable(PRESETS[key].rows);
}

function savePolar() {
  const inputs = document.querySelectorAll('#polarBody input');
  const table = {};
  inputs.forEach(inp => {
    const twa = parseInt(inp.dataset.twa);
    const twsi = parseInt(inp.dataset.twsi);
    if (!table[twa]) table[twa] = [0,0,0,0];
    table[twa][twsi] = parseFloat(inp.value) || 0;
  });
  S.polar = table;

  // Pre-compute best upwind angle per TWS
  S.polarAngles = POLAR_TWS.map((_, ti) => {
    let bestVMG = -Infinity, bestAngle = 45;
    Object.entries(table).forEach(([twa, speeds]) => {
      const a = parseInt(twa);
      if (a > 90) return; // upwind only
      const spd = speeds[ti];
      const vmg = spd * Math.cos(a * Math.PI / 180);
      if (vmg > bestVMG) { bestVMG = vmg; bestAngle = a; }
    });
    return bestAngle;
  });

  closeModal('polarModal');
  toast('Polar saved — ' + (Object.keys(table).length) + ' angles loaded');
}

// Interpolate optimal upwind angle for current TWS
function getOptimalAngle() {
  if (!S.polarAngles.length || !S.tws) return 45;
  const tws = S.tws;
  if (tws <= POLAR_TWS[0]) return S.polarAngles[0];
  if (tws >= POLAR_TWS[POLAR_TWS.length-1]) return S.polarAngles[S.polarAngles.length-1];
  for (let i = 0; i < POLAR_TWS.length-1; i++) {
    if (tws >= POLAR_TWS[i] && tws <= POLAR_TWS[i+1]) {
      const t = (tws - POLAR_TWS[i]) / (POLAR_TWS[i+1] - POLAR_TWS[i]);
      return S.polarAngles[i] * (1-t) + S.polarAngles[i+1] * t;
    }
  }
  return 45;
}

// Interpolate boat speed from polar
function getPolarSpeed(twa, tws) {
  if (!S.polar || !Object.keys(S.polar).length) return S.sog || 5;
  const angles = Object.keys(S.polar).map(Number).sort((a,b)=>a-b);
  const twi = POLAR_TWS.findIndex((t,i) => tws <= t || i === POLAR_TWS.length-1);
  const ti = Math.max(0, Math.min(twi, 3));
  // Find surrounding angles
  const absTwa = Math.abs(twa);
  let lo = angles[0], hi = angles[angles.length-1];
  for (let i = 0; i < angles.length-1; i++) {
    if (absTwa >= angles[i] && absTwa <= angles[i+1]) { lo = angles[i]; hi = angles[i+1]; break; }
  }
  const t = lo === hi ? 0 : (absTwa - lo) / (hi - lo);
  const spdLo = S.polar[lo]?.[ti] || 0;
  const spdHi = S.polar[hi]?.[ti] || 0;
  return spdLo * (1-t) + spdHi * t;
}

// ═══════════════════════════════════════════════════════
// COUNTDOWN TIMER
// ═══════════════════════════════════════════════════════
let cdInterval = null;
let selectedSeq = 5;

function selectSeq(n) {
  selectedSeq = n;
  ['seq5','seq3','seq10','seqC'].forEach(id => document.getElementById(id).classList.remove('selected'));
  const map = {5:'seq5',3:'seq3',10:'seq10',0:'seqC'};
  document.getElementById(map[n] || 'seqC').classList.add('selected');
  document.getElementById('customRow').style.display = n === 0 ? 'flex' : 'none';
}

function startCountdown() {
  let mins = selectedSeq;
  if (selectedSeq === 0) mins = parseInt(document.getElementById('customMins').value) || 5;
  CD.totalMs = mins * 60000;
  CD.startEpoch = Date.now() + CD.totalMs;
  CD.active = true;
  CD.seq = mins;
  closeModal('timerModal');
  document.getElementById('cdBar').classList.add('visible');
  if (cdInterval) clearInterval(cdInterval);
  cdInterval = setInterval(tickCountdown, 250);
  tickCountdown();
  document.getElementById('btnTimer').classList.add('on');
}

function syncGun() {
  // Sync: treat current moment as a gun — round to nearest minute and restart
  const now = Date.now();
  const remaining = CD.startEpoch ? CD.startEpoch - now : 0;
  const roundedMs = Math.round(remaining / 60000) * 60000;
  CD.startEpoch = now + roundedMs;
  closeModal('timerModal');
  toast('Synced to gun');
}

function stopCountdown() {
  if (cdInterval) clearInterval(cdInterval);
  CD.active = false;
  document.getElementById('cdBar').classList.remove('visible','seq-5','seq-4','seq-1','seq-go');
  document.getElementById('btnTimer').classList.remove('on');
}

function tickCountdown() {
  if (!CD.active) return;
  const now = Date.now();
  const rem = CD.startEpoch - now;

  if (rem <= 0) {
    // GUN
    document.getElementById('cdTime').textContent = 'GO';
    document.getElementById('cdPhase').textContent = 'RACING';
    document.getElementById('cdBar').className = 'countdown-bar visible seq-go';
    if (rem < -3000) stopCountdown(); // clear 3s after gun
    return;
  }

  const totalSec = Math.ceil(rem / 1000);
  const mins = Math.floor(totalSec / 60);
  const secs = totalSec % 60;
  document.getElementById('cdTime').textContent = `${mins}:${secs.toString().padStart(2,'0')}`;

  // Phase labels & color classes
  const bar = document.getElementById('cdBar');
  bar.className = 'countdown-bar visible'; // reset

  const seqMins = CD.seq;
  if (totalSec > (seqMins-1)*60) {
    document.getElementById('cdPhase').textContent = `${seqMins} MIN`;
    bar.classList.add('seq-5');
  } else if (totalSec > 60 && seqMins >= 4) {
    document.getElementById('cdPhase').textContent = `${Math.ceil(totalSec/60)} MIN`;
    bar.classList.add('seq-4');
  } else if (totalSec > 60) {
    document.getElementById('cdPhase').textContent = 'PREP';
    bar.classList.add('seq-4');
  } else if (totalSec <= 60 && totalSec > 10) {
    document.getElementById('cdPhase').textContent = '1 MIN';
    bar.classList.add('seq-1');
  } else {
    document.getElementById('cdPhase').textContent = 'FINAL';
    bar.classList.add('seq-1');
  }
}

document.getElementById('cdSync').addEventListener('click', () => {
  if (!CD.active) return;
  // Snap remaining to nearest whole minute
  const now = Date.now();
  const rem = CD.startEpoch - now;
  const rounded = Math.round(rem / 60000) * 60000;
  CD.startEpoch = now + rounded;
  toast('Synced ±0');
});

document.getElementById('cdStop').addEventListener('click', stopCountdown);

// ═══════════════════════════════════════════════════════
// TACTICS COMPUTATION
// ═══════════════════════════════════════════════════════
function normAngle(a) { return ((a % 360) + 360) % 360; }
function angDiff(a, b) { let d = normAngle(b-a); return d > 180 ? d-360 : d; }

function computeTactics() {
  if (!S.twd || !S.mark || !S.lat) return null;
  const polar = getOptimalAngle();
  const stbdHdg = normAngle(S.twd - polar);
  const portHdg  = normAngle(S.twd + polar);
  const markBrng = bearing(S.lat, S.lon, S.mark.lat, S.mark.lon);

  // VMG toward mark on each tack using polar speed
  const twa_stbd = angDiff(S.twd, stbdHdg);
  const twa_port  = angDiff(S.twd, portHdg);
  const spd_stbd = getPolarSpeed(twa_stbd, S.tws || 10);
  const spd_port  = getPolarSpeed(twa_port,  S.tws || 10);
  const ang_stbd  = Math.abs(angDiff(stbdHdg, markBrng)) * Math.PI/180;
  const ang_port   = Math.abs(angDiff(portHdg,  markBrng)) * Math.PI/180;
  const vmg_stbd  = spd_stbd * Math.cos(ang_stbd);
  const vmg_port   = spd_port  * Math.cos(ang_port);

  const best = vmg_stbd >= vmg_port ? 'stbd' : 'port';
  const bestHdg = best === 'stbd' ? stbdHdg : portHdg;
  const bestVMG = best === 'stbd' ? vmg_stbd : vmg_port;
  const maxPossible = Math.max(spd_stbd, spd_port);
  const eff = maxPossible > 0 ? Math.min(100, Math.max(0, bestVMG / maxPossible * 100)) : 0;

  return {
    stbdHdg, portHdg, best, bestHdg, bestVMG,
    vmg_stbd, vmg_port, eff,
    markBrng,
    layPort: normAngle(S.twd + polar + 180),
    laySttbd: normAngle(S.twd - polar + 180),
  };
}

// ═══════════════════════════════════════════════════════
// INSTRUMENT UPDATE
// ═══════════════════════════════════════════════════════
function updateInstruments() {
  const h = S.heading;
  document.getElementById('iHdg').textContent = h !== null ? Math.round(h) : '---';
  document.getElementById('iSog').textContent = S.sog.toFixed(1);
  document.getElementById('iTwa').textContent = (S.twd !== null && h !== null) ? Math.round(angDiff(S.twd, h)) + '°' : '---';

  const tac = computeTactics();
  if (tac) {
    document.getElementById('iVmg').textContent = tac.bestVMG.toFixed(1);
    const rec = document.getElementById('tackRec');
    if (tac.best === 'stbd') {
      rec.textContent = `▶ STBD TACK  ${Math.round(tac.stbdHdg)}°  VMG ${tac.vmg_stbd.toFixed(1)}kt`;
      rec.className = 'tack-rec stbd';
    } else {
      rec.textContent = `◀ PORT TACK  ${Math.round(tac.portHdg)}°  VMG ${tac.vmg_port.toFixed(1)}kt`;
      rec.className = 'tack-rec port';
    }
    drawVMGArc(tac.eff);
  } else {
    document.getElementById('iVmg').textContent = '--';
    document.getElementById('tackRec').textContent = 'SET COURSE TO COMPUTE TACK';
    document.getElementById('tackRec').className = 'tack-rec none';
    drawVMGArc(0);
  }

  // Wind badge
  document.getElementById('wbSpd').textContent = S.tws !== null ? Math.round(S.tws)+'kt' : '--kt';
  document.getElementById('wbDir').textContent = S.twd !== null ? Math.round(S.twd)+'°' : '---°';
}

function drawVMGArc(eff) {
  const c = document.getElementById('vmgArc');
  const x = c.getContext('2d');
  const W = 44, cx = 22, cy = 22, r = 18;
  x.clearRect(0,0,W,W);
  x.strokeStyle = 'rgba(0,212,170,0.12)'; x.lineWidth = 4;
  x.beginPath(); x.arc(cx,cy,r,0,2*Math.PI); x.stroke();
  if (eff > 0) {
    const col = eff > 75 ? '#4cde80' : eff > 40 ? '#00d4aa' : '#f5a623';
    x.strokeStyle = col; x.lineWidth = 4;
    x.beginPath();
    x.arc(cx,cy,r,-Math.PI/2, -Math.PI/2 + (eff/100)*2*Math.PI);
    x.stroke();
  }
  x.fillStyle = eff > 0 ? 'rgba(0,212,170,0.9)' : 'rgba(74,104,128,0.6)';
  x.font = 'bold 9px Space Mono, monospace';
  x.textAlign = 'center'; x.textBaseline = 'middle';
  x.fillText(eff > 0 ? Math.round(eff) : '--', cx, cy);
}

// ═══════════════════════════════════════════════════════
// WIND ROSE (badge)
// ═══════════════════════════════════════════════════════
function renderWindRose() {
  const c = document.getElementById('wrCanvas');
  const x = c.getContext('2d');
  const W=64, cx=32, cy=32, r=28;
  x.clearRect(0,0,W,W);
  x.fillStyle='rgba(6,16,32,0.6)';
  x.beginPath(); x.arc(cx,cy,r,0,2*Math.PI); x.fill();
  x.strokeStyle='rgba(0,212,170,0.15)'; x.lineWidth=1;
  x.beginPath(); x.arc(cx,cy,r,0,2*Math.PI); x.stroke();

  if (S.twd !== null) {
    const tws = S.tws || 0;
    const rad = (S.twd - 90)*Math.PI/180;
    // Stem
    x.strokeStyle='#f5a623'; x.lineWidth=2;
    x.beginPath();
    x.moveTo(cx,cy);
    x.lineTo(cx+Math.cos(rad)*r*0.82, cy+Math.sin(rad)*r*0.82);
    x.stroke();
    // Arrowhead
    const ex=cx+Math.cos(rad)*r*0.82, ey=cy+Math.sin(rad)*r*0.82;
    x.save(); x.translate(ex,ey); x.rotate(rad+Math.PI/2);
    x.fillStyle='#f5a623';
    x.beginPath(); x.moveTo(0,0); x.lineTo(-4,10); x.lineTo(4,10); x.closePath(); x.fill();
    x.restore();
    // Speed barbs
    const barbs = Math.min(Math.round(tws/5), 5);
    for (let b=0; b<barbs; b++) {
      const t=0.25+b*0.14;
      const bx=cx+Math.cos(rad)*r*0.82*t, by=cy+Math.sin(rad)*r*0.82*t;
      const p=rad-Math.PI/2;
      x.strokeStyle='rgba(245,166,35,0.7)'; x.lineWidth=1.5;
      x.beginPath(); x.moveTo(bx,by); x.lineTo(bx+Math.cos(p)*7,by+Math.sin(p)*7); x.stroke();
    }
  } else {
    x.fillStyle='rgba(74,104,128,0.6)';
    x.font='bold 8px Space Mono, monospace';
    x.textAlign='center'; x.textBaseline='middle';
    x.fillText('NO',cx,cy-5); x.fillText('WIND',cx,cy+6);
  }
}

// ═══════════════════════════════════════════════════════
// TACTICAL CHART RENDER
// ═══════════════════════════════════════════════════════
function getBounds() {
  const pts = [];
  if (S.pinA) pts.push(S.pinA); if (S.pinB) pts.push(S.pinB);
  if (S.mark) pts.push(S.mark); if (S.lwMark) pts.push(S.lwMark);
  if (S.lat) pts.push({lat:S.lat,lon:S.lon});
  if (!pts.length) return null;
  let minLat=Infinity,maxLat=-Infinity,minLon=Infinity,maxLon=-Infinity;
  pts.forEach(p=>{minLat=Math.min(minLat,p.lat);maxLat=Math.max(maxLat,p.lat);minLon=Math.min(minLon,p.lon);maxLon=Math.max(maxLon,p.lon);});
  const pLat=Math.max((maxLat-minLat)*0.28,0.004), pLon=Math.max((maxLon-minLon)*0.28,0.005);
  return {minLat:minLat-pLat,maxLat:maxLat+pLat,minLon:minLon-pLon,maxLon:maxLon+pLon};
}

function proj(lat, lon, b, W, H) {
  return {
    x: (lon-b.minLon)/(b.maxLon-b.minLon)*W,
    y: (1-(lat-b.minLat)/(b.maxLat-b.minLat))*H
  };
}

function render() {
  const W = tc.width / devicePixelRatio;
  const H = tc.height / devicePixelRatio;
  ctx.save();
  ctx.scale(devicePixelRatio, devicePixelRatio);
  ctx.clearRect(0,0,W,H);

  // ── Background
  ctx.fillStyle = '#091524';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = 'rgba(0,212,170,0.04)'; ctx.lineWidth = 1;
  for (let x=0; x<W; x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<H; y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  const bounds = getBounds();
  if (!bounds) {
    ctx.fillStyle = 'rgba(0,212,170,0.2)';
    ctx.font = '600 14px Barlow Condensed, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('TAP COURSE TO SET MARKS', W/2, H/2-12);
    ctx.font = '13px Barlow Condensed, sans-serif';
    ctx.fillStyle = 'rgba(74,104,128,0.7)';
    ctx.fillText('or DEMO to start immediately', W/2, H/2+12);
    ctx.restore(); return;
  }

  const p = (lat,lon) => proj(lat,lon,bounds,W,H);

  // ── Wind corridor from mark
  if (S.twd !== null && S.mark) {
    const mk = p(S.mark.lat, S.mark.lon);
    const rad = (S.twd+180)*Math.PI/180;
    const len = Math.max(W,H)*0.6;
    const hw = 40;
    const px = Math.cos(rad), py = -Math.sin(rad);
    const ox = -py, oy = px;
    ctx.save();
    const grad = ctx.createLinearGradient(mk.x, mk.y, mk.x+px*len, mk.y+py*len);
    grad.addColorStop(0,'rgba(0,212,170,0.07)');
    grad.addColorStop(1,'rgba(0,212,170,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(mk.x+ox*hw, mk.y+oy*hw);
    ctx.lineTo(mk.x+px*len+ox*hw, mk.y+py*len+oy*hw);
    ctx.lineTo(mk.x+px*len-ox*hw, mk.y+py*len-oy*hw);
    ctx.lineTo(mk.x-ox*hw, mk.y-oy*hw);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // ── Laylines
  if (S.twd !== null && S.mark) {
    const tac = computeTactics();
    if (tac) {
      const mk = p(S.mark.lat, S.mark.lon);
      const len = Math.max(W,H)*1.5;
      // Stbd layline (green)
      const sRad = tac.laySttbd * Math.PI/180;
      ctx.strokeStyle = 'rgba(76,222,128,0.3)'; ctx.lineWidth = 1.5;
      ctx.setLineDash([6,5]);
      ctx.beginPath(); ctx.moveTo(mk.x,mk.y);
      ctx.lineTo(mk.x+Math.sin(sRad)*len, mk.y-Math.cos(sRad)*len); ctx.stroke();
      // Port layline (red)
      const pRad = tac.layPort * Math.PI/180;
      ctx.strokeStyle = 'rgba(232,64,64,0.3)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(mk.x,mk.y);
      ctx.lineTo(mk.x+Math.sin(pRad)*len, mk.y-Math.cos(pRad)*len); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // ── Recommended route
  if (S.lat && S.mark && S.twd !== null) {
    const tac = computeTactics();
    if (tac) {
      const bp = p(S.lat, S.lon);
      const mk = p(S.mark.lat, S.mark.lon);
      const col = tac.best === 'stbd' ? 'rgba(76,222,128,0.9)' : 'rgba(232,64,64,0.9)';
      const hdgRad = tac.bestHdg * Math.PI/180;
      const legLen = Math.hypot(mk.x-bp.x, mk.y-bp.y) * 0.55;
      const tpx = bp.x + Math.sin(hdgRad)*legLen;
      const tpy = bp.y - Math.cos(hdgRad)*legLen;

      ctx.strokeStyle = col; ctx.lineWidth = 2;
      ctx.setLineDash([9,4]);
      ctx.beginPath();
      ctx.moveTo(bp.x, bp.y);
      ctx.lineTo(tpx, tpy);
      ctx.lineTo(mk.x, mk.y);
      ctx.stroke();
      ctx.setLineDash([]);

      // Tack point indicator
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(tpx,tpy,4,0,2*Math.PI); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(tpx,tpy,4,0,2*Math.PI); ctx.stroke();
    }
  }

  // ── Track
  if (S.track.length > 1) {
    ctx.strokeStyle = 'rgba(0,212,170,0.35)'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    S.track.forEach((pt,i)=>{const px=p(pt.lat,pt.lon); i===0?ctx.moveTo(px.x,px.y):ctx.lineTo(px.x,px.y);});
    ctx.stroke();
  }

  // ── Start line
  if (S.pinA && S.pinB) {
    const a=p(S.pinA.lat,S.pinA.lon), b=p(S.pinB.lat,S.pinB.lon);
    ctx.strokeStyle='rgba(245,166,35,0.85)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    // Pin A — square
    drawBuoy(ctx, a.x, a.y, 'square', '#f5a623', 'A');
    // Pin B — circle
    drawBuoy(ctx, b.x, b.y, 'circle', '#f5a623', 'B');
    // Label
    ctx.fillStyle='rgba(245,166,35,0.6)';
    ctx.font='11px Barlow Condensed, sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='bottom';
    ctx.fillText('START LINE', Math.min(a.x,b.x), Math.min(a.y,b.y)-3);
  }

  // ── Windward mark
  if (S.mark) {
    const mk=p(S.mark.lat,S.mark.lon);
    drawBuoy(ctx, mk.x, mk.y, 'diamond', '#ffdf00', 'W');
    ctx.fillStyle='rgba(255,223,0,0.6)';
    ctx.font='11px Barlow Condensed, sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='bottom';
    ctx.fillText('WIND MARK', mk.x+12, mk.y-3);
  }

  // ── Leeward mark
  if (S.lwMark) {
    const lw=p(S.lwMark.lat,S.lwMark.lon);
    drawBuoy(ctx, lw.x, lw.y, 'circle', '#00a888', 'L');
    ctx.fillStyle='rgba(0,168,136,0.6)';
    ctx.font='11px Barlow Condensed, sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='bottom';
    ctx.fillText('LEE MARK', lw.x+12, lw.y-3);
  }

  // ── Boat
  if (S.lat) {
    const bp = p(S.lat, S.lon);
    drawBoat(ctx, bp.x, bp.y, (S.heading || S.cog || 0)*Math.PI/180);
  }

  // ── North indicator
  ctx.fillStyle='rgba(0,212,170,0.45)';
  ctx.font='bold 11px Space Mono, monospace';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText('N ↑',10,10);

  // ── Scale bar
  const latSpan = bounds.maxLat-bounds.minLat;
  const nmSpan = latSpan * 60;
  const barNM = nmSpan < 0.3 ? 0.05 : nmSpan < 1 ? 0.1 : nmSpan < 3 ? 0.5 : 1;
  const barPx = (barNM/nmSpan)*H;
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(10,H-18); ctx.lineTo(10+barPx,H-18); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.font='9px Space Mono, monospace'; ctx.textAlign='left'; ctx.textBaseline='bottom';
  ctx.fillText(barNM.toFixed(2)+' NM',10,H-6);

  ctx.restore();
}

function drawBuoy(ctx, x, y, shape, color, label) {
  ctx.fillStyle = color;
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1;
  if (shape === 'circle') {
    ctx.beginPath(); ctx.arc(x,y,8,0,2*Math.PI); ctx.fill(); ctx.stroke();
  } else if (shape === 'square') {
    ctx.beginPath(); ctx.rect(x-7,y-7,14,14); ctx.fill(); ctx.stroke();
  } else if (shape === 'diamond') {
    ctx.beginPath(); ctx.moveTo(x,y-10); ctx.lineTo(x+8,y); ctx.lineTo(x,y+10); ctx.lineTo(x-8,y); ctx.closePath(); ctx.fill(); ctx.stroke();
  }
  ctx.fillStyle = '#000';
  ctx.font = 'bold 9px Space Mono, monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y+0.5);
}

function drawBoat(ctx, x, y, hdgRad) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(hdgRad);
  // Shadow glow
  ctx.shadowColor = '#00d4aa'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#00d4aa';
  ctx.beginPath();
  ctx.moveTo(0,-15); ctx.quadraticCurveTo(6,0,4,12); ctx.lineTo(0,9); ctx.lineTo(-4,12); ctx.quadraticCurveTo(-6,0,0,-15);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  // Mast
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0,-3,2,0,2*Math.PI); ctx.fill();
  // Heading vector
  ctx.strokeStyle='rgba(0,212,170,0.5)'; ctx.lineWidth=1.5;
  ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(0,-15); ctx.lineTo(0,-35); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
// MATH
// ═══════════════════════════════════════════════════════
function haversine(lat1,lon1,lat2,lon2) {
  const R=6371000, dl=((lat2-lat1)*Math.PI/180), dn=((lon2-lon1)*Math.PI/180);
  const a=Math.sin(dl/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dn/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearing(lat1,lon1,lat2,lon2) {
  const dn=(lon2-lon1)*Math.PI/180;
  const y=Math.sin(dn)*Math.cos(lat2*Math.PI/180);
  const x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dn);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function midpoint(a,b) { return {lat:(a.lat+b.lat)/2,lon:(a.lon+b.lon)/2}; }

// ═══════════════════════════════════════════════════════
// MODAL / UI HELPERS
// ═══════════════════════════════════════════════════════
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
function setPill(id, state) {
  const el = document.getElementById(id);
  el.className = 'pill ' + (state === 'off' ? '' : state);
}
function switchTab(modal, tab) {
  document.querySelectorAll(`#${modal}Modal .mtab`).forEach(t=>t.classList.remove('active'));
  document.querySelectorAll(`#${modal}Modal .tab-panel`).forEach(p=>p.classList.remove('active'));
  const panels = document.querySelectorAll(`#${modal}Modal .tab-panel`);
  const tabs = document.querySelectorAll(`#${modal}Modal .mtab`);
  // find by panel id suffix
  document.querySelectorAll(`#${modal}Modal .tab-panel`).forEach(p=>{
    if (p.id === `${modal}-${tab}`) p.classList.add('active');
  });
  document.querySelectorAll(`#${modal}Modal .mtab`).forEach(t=>{
    if (t.getAttribute('onclick')?.includes(tab)) t.classList.add('active');
  });
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// Close modal on background tap
document.querySelectorAll('.modal-bg').forEach(bg=>{
  bg.addEventListener('click', e=>{ if(e.target===bg) bg.classList.remove('open'); });
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
initPolarTable();
render();
renderWindRose();
updateInstruments();
setInterval(()=>{ render(); renderWindRose(); updateInstruments(); }, 500);
</script>
